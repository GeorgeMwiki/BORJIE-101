<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Borjie — Offline</title>
    <meta name="theme-color" content="#17100A" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #17100a;
        --fg: #f5ecd5;
        --muted: #b7a98c;
        --accent: #d4af37;
        --border: rgba(245, 236, 213, 0.12);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; min-height: 100vh; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .card {
        max-width: 480px;
        text-align: center;
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 32px 28px;
        background: rgba(245, 236, 213, 0.03);
      }
      .logo {
        height: 28px;
        margin: 0 auto 24px;
        display: block;
        opacity: 0.95;
      }
      h1 {
        font-family: "Syne", ui-sans-serif, sans-serif;
        font-size: 28px;
        margin: 0 0 12px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 8px;
        color: var(--muted);
        line-height: 1.55;
        font-size: 15px;
      }
      .copy-en {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
        font-size: 13px;
        color: var(--muted);
      }
      button {
        margin-top: 22px;
        background: var(--accent);
        color: #17100a;
        border: none;
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s ease;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="card" role="alert" aria-live="polite">
      <img
        class="logo"
        src="/borjie-lockup-horizontal.svg"
        alt="Borjie"
        onerror="this.style.display='none'"
      />
      <h1>Hauko mtandaoni</h1>
      <p>Bw. Mwikila atakuwa hapa utakaporudi.</p>
      <div class="copy-en">
        <p><strong style="color: var(--fg)">You're offline.</strong></p>
        <p>Mr. Mwikila will be here when you're back.</p>
      </div>
      <button type="button" onclick="window.location.reload()">
        Jaribu tena · Try again
      </button>
    </div>
  </body>
</html>
