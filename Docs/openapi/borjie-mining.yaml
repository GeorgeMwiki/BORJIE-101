components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiErrorEnvelope:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    ApiSuccessEnvelope:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
    AssayResultSchema:
      type: object
      required:
        - analyte
        - value
      properties:
        analyte:
          type: string
          description: e.g. Au, Cu, Fe
        value:
          type: number
        unit:
          type: string
          default: g/t
        labId:
          type: string
        receivedAt:
          type: string
          format: date-time
    ChatTurnSchema:
      type: object
      required:
