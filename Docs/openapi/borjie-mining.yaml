  parameters: {}
paths:
  /api/v1/mining/attendance/check-in:
    post:
      tags:
        - attendance
      summary: GPS-fenced check-in for the start of a shift.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": '#/components/schemas/AttendanceCheckInRequest'
      responses:
        201:
          description: New attendance row.
          content:
            application/json:
              schema:
                allOf:
                  - "$ref": '#/components/schemas/ApiSuccessEnvelope'
                  - properties:
                      success:
                        type: boolean
                        enum:
                          - true
                        example: true
                      data:
                        "$ref": '#/components/schemas/AttendanceRow'
                      meta:
                        type: object
                        properties:
                          total:
                            type: integer
                            minimum: 0
                          page:
                            type: integer
                            minimum: 0
                          limit:
                            type: integer
                            exclusiveMinimum: 0
        400:
          description: Validation or business error.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
        401:
          description: Auth missing or invalid.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
        422:
          description: GPS fence rejected the check-in.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
        500:
          description: Unhandled server error.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
  /api/v1/mining/attendance/check-out:
    post:
      tags:
        - attendance
      summary: Close an open attendance row (computes hoursWorked).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": '#/components/schemas/AttendanceCheckOutRequest'
      responses:
        200:
          description: Closed attendance row.
          content:
            application/json:
              schema:
                allOf:
                  - "$ref": '#/components/schemas/ApiSuccessEnvelope'
                  - properties:
                      success:
                        type: boolean
                        enum:
                          - true
                        example: true
                      data:
                        "$ref": '#/components/schemas/AttendanceRow'
                      meta:
                        type: object
                        properties:
                          total:
                            type: integer
                            minimum: 0
                          page:
                            type: integer
                            minimum: 0
                          limit:
                            type: integer
                            exclusiveMinimum: 0
        400:
          description: Validation or business error.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
        401:
          description: Auth missing or invalid.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
        404:
          description: Resource not found.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
        500:
          description: Unhandled server error.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
  /api/v1/mining/bids:
    post:
      tags:
        - bids
      summary: Buyer places a bid on a marketplace listing.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": '#/components/schemas/PlaceBidRequest'
      responses:
        201:
          description: Newly created bid row.
          content:
            application/json:
              schema:
                allOf:
                  - "$ref": '#/components/schemas/ApiSuccessEnvelope'
                  - properties:
                      success:
                        type: boolean
                        enum:
                          - true
                        example: true
                      data:
                        "$ref": '#/components/schemas/Bid'
                      meta:
                        type: object
                        properties:
                          total:
                            type: integer
                            minimum: 0
                          page:
                            type: integer
                            minimum: 0
                          limit:
                            type: integer
                            exclusiveMinimum: 0
        400:
          description: Validation or business error.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
        401:
          description: Auth missing or invalid.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
        403:
          description: Buyer must complete KYC before bidding.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/BidKycGateError'
        404:
          description: Resource not found.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
        500:
          description: Unhandled server error.
          content:
            application/json:
              schema:
                "$ref": '#/components/schemas/ApiErrorEnvelope'
    get:
      tags:
        - bids
      summary: Seller view of bids on one listing.
      security:
        - BearerAuth: []
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: listing_id
          in: query
