apiVersion: apps/v1
kind: Deployment
metadata:
  name: estate-manager
  namespace: borjie
  labels:
    app: estate-manager
    app.kubernetes.io/name: estate-manager
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: estate-manager
  template:
    metadata:
      labels:
        app: estate-manager
        app.kubernetes.io/name: estate-manager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000           # matches Next.js standalone runner `nextjs` user
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: estate-manager
          image: borjie/estate-manager-app:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem: Next.js writes .next/cache to disk
            # for ISR; keep RW root.
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: borjie-config
                  key: NEXT_PUBLIC_API_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
