# Secret template - use Kustomize secretGenerator or external-secrets in production
# DO NOT commit actual secrets. This file shows the structure.
# Override with: kustomize edit add secret ...
apiVersion: v1
kind: Secret
metadata:
  name: borjie-secrets
  namespace: borjie
  labels:
    app.kubernetes.io/name: borjie
type: Opaque
stringData:
  # Replace with base64-encoded values or use secretGenerator in overlays
  # POSTGRES_USER: ""
  # POSTGRES_PASSWORD: ""
  # DATABASE_URL: ""
  # REDIS_URL: ""
  # JWT_SECRET: ""
  # API_KEY: ""
  # Audit hash-chain HMAC root — packages/ai-copilot/src/security/audit-hash-chain.ts.
  # REQUIRED in production; absence silently degrades the chain to unkeyed SHA-256.
  # Generate: openssl rand -base64 48. _PREV is the 24h rotation overlap slot
  # (see Docs/SECRETS_ROTATION.md).
  # SESSION_HASH_SECRET: ""
  # SESSION_HASH_SECRET_PREV: ""
