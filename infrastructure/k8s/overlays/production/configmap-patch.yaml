apiVersion: v1
kind: ConfigMap
metadata:
  name: borjie-config
  namespace: borjie
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  API_URL: "https://api.borjie.com/api/v1"
  POSTGRES_HOST: ""  # Managed RDS - set via secrets
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "borjie"
  REDIS_HOST: ""  # Managed ElastiCache - set via secrets
  REDIS_PORT: "6379"
