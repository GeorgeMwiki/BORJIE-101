# =============================================================================
# BORJIE — PagerDuty service definitions
# =============================================================================
# Source-of-truth YAML for PagerDuty services. Apply via Terraform
# (`infra/terraform/pagerduty/` — see README) or via `pdc-cli services apply`.
#
# Severity routing convention:
#   - critical  -> page primary on-call immediately (P0)
#   - error     -> page primary on-call after 5 min (P1)
#   - warning   -> Slack-only via #status-ops (no page)
#   - info      -> log only
#
# Escalation policies are defined separately in
# `infra/pagerduty/escalation-policies.yaml` and referenced here by name.
# Names — NOT IDs — are used so this file is human-reviewable; the apply
# pipeline resolves names to PagerDuty IDs at submit time.
# =============================================================================

apiVersion: pagerduty.com/v1
kind: Service
metadata:
  name: api-gateway
  description: |
    Core REST + GraphQL API gateway. Front door to every BORJIE tenant.
    Down-time is customer-visible within seconds.
spec:
  escalation_policy: eng-primary-then-exec
  auto_resolve_timeout: 14400          # 4 h
  acknowledgement_timeout: 600         # 10 min
  alert_creation: create_alerts_and_incidents
  severity_routing:
    critical:
      urgency: high
      notify: page
      sla_minutes: 5
    error:
      urgency: high
      notify: page
      sla_minutes: 15
    warning:
      urgency: low
      notify: slack
      channel: "#status-ops"
    info:
      urgency: low
      notify: log_only
  integrations:
    - type: prometheus
      name: prometheus-api-gateway
    - type: events_v2
      name: github-actions-cd
    - type: sentry
      name: sentry-api-gateway
---
apiVersion: pagerduty.com/v1
kind: Service
metadata:
  name: payments-ledger
  description: |
    Double-entry ledger + GePG / mobile-money settlement. Customer funds at
    stake — every alert is at minimum P1, ledger imbalance is always P0.
spec:
  escalation_policy: payments-then-eng-primary
  auto_resolve_timeout: 14400
  acknowledgement_timeout: 600
  alert_creation: create_alerts_and_incidents
  severity_routing:
    critical:
      urgency: high
      notify: page
      sla_minutes: 5
    error:
      urgency: high
      notify: page
      sla_minutes: 15
    warning:
      urgency: low
      notify: slack
      channel: "#status-ops"
    info:
      urgency: low
      notify: log_only
  integrations:
    - type: prometheus
      name: prometheus-payments-ledger
    - type: events_v2
      name: gepg-webhook-failures
    - type: sentry
      name: sentry-payments-ledger
---
apiVersion: pagerduty.com/v1
kind: Service
metadata:
  name: brain
  description: |
    AI orchestration: Anthropic + OpenAI fallback, MCP fan-out, autonomy
    governor. Downtime degrades chat / briefings but does NOT block
    transactions. Default urgency is one step lower than api-gateway.
spec:
  escalation_policy: ai-then-eng-primary
  auto_resolve_timeout: 14400
  acknowledgement_timeout: 1200        # 20 min — non-customer-blocking
  alert_creation: create_alerts_and_incidents
  severity_routing:
    critical:
      urgency: high
      notify: page
      sla_minutes: 15
    error:
      urgency: low
      notify: page
      sla_minutes: 30
    warning:
      urgency: low
      notify: slack
      channel: "#status-ops"
    info:
      urgency: low
      notify: log_only
  integrations:
    - type: prometheus
      name: prometheus-brain
    - type: anthropic-status-page
      name: anthropic-upstream
    - type: sentry
      name: sentry-brain
---
apiVersion: pagerduty.com/v1
kind: Service
metadata:
  name: background-jobs
  description: |
    Outbox worker, scheduler, notifications dispatcher. Backlogs surface
    as customer-visible delays (rent reminders, receipts) but never as
    transaction failures. P1 by default.
spec:
  escalation_policy: eng-primary-only
  auto_resolve_timeout: 14400
  acknowledgement_timeout: 1800        # 30 min
  alert_creation: create_alerts_and_incidents
  severity_routing:
    critical:
      urgency: high
      notify: page
      sla_minutes: 15
    error:
      urgency: low
      notify: page
      sla_minutes: 30
    warning:
      urgency: low
      notify: slack
      channel: "#status-ops"
    info:
      urgency: low
      notify: log_only
  integrations:
    - type: prometheus
      name: prometheus-background-jobs
    - type: sentry
      name: sentry-background-jobs
---
apiVersion: pagerduty.com/v1
kind: Service
metadata:
  name: infrastructure
  description: |
    Postgres (RDS), Redis (ElastiCache), Kubernetes control plane,
    networking. Every alert here is structural; default urgency is P0.
spec:
  escalation_policy: db-then-eng-primary
  auto_resolve_timeout: 14400
  acknowledgement_timeout: 600
  alert_creation: create_alerts_and_incidents
  severity_routing:
    critical:
      urgency: high
      notify: page
      sla_minutes: 5
    error:
      urgency: high
      notify: page
      sla_minutes: 15
    warning:
      urgency: low
      notify: slack
      channel: "#status-ops"
    info:
      urgency: low
      notify: log_only
  integrations:
    - type: cloudwatch
      name: cloudwatch-rds
    - type: cloudwatch
      name: cloudwatch-elasticache
    - type: prometheus
      name: prometheus-cluster
