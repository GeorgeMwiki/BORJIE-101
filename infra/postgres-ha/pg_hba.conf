# =============================================================================
# Postgres HA — pg_hba.conf
# =============================================================================
# Replication uses scram-sha-256 between Patroni nodes (replicator user).
# App auth uses scram-sha-256 too — keep this consistent with the password
# encryption in patroni.yml.tpl (postgresql.parameters: password_encryption).
# =============================================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local socket — postgres superuser only (Patroni health checks)
local   all             postgres                                trust
local   replication     replicator                              trust

# Patroni REST API + intra-cluster replication (data-plane network)
host    replication     replicator      10.0.0.0/8              scram-sha-256
host    replication     replicator      172.16.0.0/12           scram-sha-256
host    replication     replicator      192.168.0.0/16          scram-sha-256

# Rewind user — used by pg_rewind after failover
host    all             rewind_user     10.0.0.0/8              scram-sha-256
host    all             rewind_user     172.16.0.0/12           scram-sha-256
host    all             rewind_user     192.168.0.0/16          scram-sha-256

# Application traffic via HAProxy (docker network)
host    all             all             10.0.0.0/8              scram-sha-256
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             192.168.0.0/16          scram-sha-256

# Reject everything else
host    all             all             0.0.0.0/0               reject
