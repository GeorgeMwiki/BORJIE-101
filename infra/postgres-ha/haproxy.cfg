# =============================================================================
# HAProxy — Postgres HA front-end
# =============================================================================
# - Port 5432 → current Patroni leader (writes)
# - Port 5433 → all healthy replicas (reads, round-robin)
# - Port 7000 → HAProxy stats UI (basic auth, internal only)
#
# Patroni REST health probes:
#   GET :8008/master  -> 200 if this node is leader, 503 otherwise
#   GET :8008/replica -> 200 if this node is a healthy replica, 503 otherwise
#
# Failover RTO budget: TTL 30s + httpchk inter 3s + Patroni promote ~10s = ~30-45s.
# =============================================================================

global
    maxconn 4096
    log     stdout format raw local0
    user    haproxy
    group   haproxy

defaults
    log     global
    mode    tcp
    retries 2
    timeout client          30m
    timeout connect         4s
    timeout server          30m
    timeout check           5s
    default-server          init-addr last,libc,none

# -----------------------------------------------------------------------------
# Stats UI (internal only — bind to docker network, never to host)
# -----------------------------------------------------------------------------
listen stats
    mode    http
    bind    *:7000
    stats   enable
    stats   uri /
    stats   refresh 10s
    stats   admin if TRUE

# -----------------------------------------------------------------------------
# Writes — single backend, the current Patroni leader.
# httpchk hits Patroni REST :8008/master — only one node returns 200.
# -----------------------------------------------------------------------------
listen postgres-primary
    bind    *:5432
    option  httpchk
    http-check send meth GET uri /master
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions

    server postgres-primary   postgres-primary:5432   check port 8008
    server postgres-replica-1 postgres-replica-1:5432 check port 8008
    server postgres-replica-2 postgres-replica-2:5432 check port 8008

# -----------------------------------------------------------------------------
# Reads — all replicas, round-robin. Probe :8008/replica.
# -----------------------------------------------------------------------------
listen postgres-replicas
    bind    *:5433
    balance roundrobin
    option  httpchk
    http-check send meth GET uri /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2

    server postgres-primary   postgres-primary:5432   check port 8008
    server postgres-replica-1 postgres-replica-1:5432 check port 8008
    server postgres-replica-2 postgres-replica-2:5432 check port 8008
