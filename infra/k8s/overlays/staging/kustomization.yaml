# =============================================================================
# Staging overlay — thinner replicas, smaller envelope, staging hostnames
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-staging

resources:
  - ../../namespaces/borjie-staging.yaml
  - ../../base

# Image tags pinned by the CD workflow via `kustomize edit set image`.
images:
  - { name: ghcr.io/georgemwiki/borjie-api-gateway,           newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-consolidation-worker,  newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-mcp-process-intel,     newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-mcp-nin,               newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-mcp-firs,              newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-mcp-nggis,             newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-mcp-opay,              newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-document-intelligence, newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-domain-services,       newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-identity,              newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-notifications,         newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-payments,              newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-reports,               newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-webhooks,              newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-customer-app,          newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-owner-portal,          newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-admin-web, newTag: staging }
  - { name: ghcr.io/georgemwiki/borjie-estate-manager-app,    newTag: staging }

# ---- Replica counts ---------------------------------------------------------
# Each entry references the shared one-op JSON-Patch in patches/replica-1.yaml
# and targets a different Deployment.
patches:
  - path: patches/replica-1.yaml
    target: { kind: Deployment, name: api-gateway }
  - path: patches/replica-1.yaml
    target: { kind: Deployment, name: customer-app }
  - path: patches/replica-1.yaml
    target: { kind: Deployment, name: owner-portal }
  - path: patches/replica-1.yaml
    target: { kind: Deployment, name: admin-web }
  - path: patches/replica-1.yaml
    target: { kind: Deployment, name: estate-manager-app }
  - path: patches/replica-1.yaml
    target: { kind: Deployment, name: document-intelligence }
  - path: patches/replica-1.yaml
    target: { kind: Deployment, name: domain-services }
  - path: patches/replica-1.yaml
    target: { kind: Deployment, name: identity }
  - path: patches/replica-1.yaml
    target: { kind: Deployment, name: notifications }
  - path: patches/replica-1.yaml
    target: { kind: Deployment, name: payments }
  - path: patches/hpa-staging.yaml
    target: { kind: HorizontalPodAutoscaler, name: api-gateway }
  - path: patches/pdb-staging.yaml
    target: { kind: PodDisruptionBudget, name: api-gateway }
  - path: patches/api-gateway-resources.yaml
    target: { kind: Deployment, name: api-gateway }
  - path: patches/postgres-resources.yaml
    target: { kind: StatefulSet, name: postgres }
  - path: patches/ingress-hosts.yaml
    target: { kind: Ingress, name: borjie }

configMapGenerator:
  - name: borjie-config
    behavior: merge
    literals:
      - SENTRY_ENVIRONMENT=staging
      - API_URL=https://staging-api.borjie.com
      - FRONTEND_URL=https://staging.borjie.com
      - CORS_ALLOWED_ORIGINS=https://staging.borjie.com,https://staging-admin.borjie.com,https://staging-owners.borjie.com,https://staging-manage.borjie.com
  - name: borjie-public-config
    behavior: merge
    literals:
      - NEXT_PUBLIC_API_URL=https://staging-api.borjie.com/api/v1
      - VITE_API_URL=https://staging-api.borjie.com/api/v1
