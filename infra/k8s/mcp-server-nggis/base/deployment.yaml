# =============================================================================
# mcp-server-nggis — Nigeria land-registry federal aggregator (Deployment, stdio)
# Source: services/mcp-server-nggis
#   - Pure stdio MCP server. Fans out to per-state registries (LASRRA,
#     ABGIS, KADGIS, ...) behind a single federal-aggregator interface.
#   - CRITICAL-4 per-tenant allowlist guard enforced.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-nggis
  labels:
    app.kubernetes.io/name: mcp-server-nggis
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-server-nggis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-server-nggis
        app.kubernetes.io/part-of: borjie
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/version: "0.1.0"
    spec:
      serviceAccountName: mcp-server-nggis
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-server-nggis
          image: ghcr.io/georgemwiki/borjie-mcp-server-nggis:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: mcp-server-nggis-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: OTEL_SERVICE_NAME
              value: mcp-server-nggis
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server-nggis
  labels:
    app.kubernetes.io/name: mcp-server-nggis
    app.kubernetes.io/part-of: borjie
automountServiceAccountToken: false
