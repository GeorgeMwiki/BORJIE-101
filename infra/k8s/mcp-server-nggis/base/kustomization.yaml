# =============================================================================
# mcp-server-nggis base — Deployment + NetworkPolicy + ExternalSecret
# =============================================================================
# stdio-only MCP server — no HTTP / Service / HPA / PDB / ServiceMonitor.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-app

commonLabels:
  app.kubernetes.io/part-of: borjie
  app.kubernetes.io/managed-by: kustomize

resources:
  - deployment.yaml
  - networkpolicy.yaml
  - externalsecret.yaml

images:
  - name: ghcr.io/georgemwiki/borjie-mcp-server-nggis
    newTag: latest
