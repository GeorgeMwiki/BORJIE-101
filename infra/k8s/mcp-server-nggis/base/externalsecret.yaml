# =============================================================================
# mcp-server-nggis — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/mcp-server-nggis`:
#   - MCP_TENANT_ALLOWLIST           CRITICAL-4 (JSON allowlist)
#   - NGGIS_LASRRA_API_KEY           Lagos State registry
#   - NGGIS_ABGIS_API_KEY            Abia State registry
#   - NGGIS_KADGIS_API_KEY           Kaduna State registry
#   - NGGIS_BASE_URL                 optional override
#   - OTEL_EXPORTER_OTLP_ENDPOINT
#   - SENTRY_DSN
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mcp-server-nggis-secrets
  labels:
    app.kubernetes.io/name: mcp-server-nggis
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: mcp-server-nggis-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/mcp-server-nggis
