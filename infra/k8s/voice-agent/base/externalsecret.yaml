# =============================================================================
# voice-agent — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/voice-agent`:
#   - OPENAI_API_KEY            gpt-realtime-2 primary
#   - ELEVENLABS_API_KEY        ElevenLabs v3 TTS
#   - LELAPA_API_KEY            Lelapa Vulavula (Sw / Lug)
#   - SPITCH_API_KEY            Spitch (Yo / Ig / Ha)
#   - CARTESIA_API_KEY          Cartesia Sonic-2 low-latency fallback
#   - VOICE_WS_BASE_URL         External WS endpoint base URL (optional)
#   - DATABASE_URL              session lookup
#   - REDIS_URL                 session affinity hints
#   - SENTRY_DSN
#   - OTEL_EXPORTER_OTLP_ENDPOINT
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: voice-agent-secrets
  labels:
    app.kubernetes.io/name: voice-agent
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: voice-agent-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/voice-agent
