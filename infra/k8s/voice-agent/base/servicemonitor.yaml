apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: voice-agent
  labels:
    app.kubernetes.io/name: voice-agent
    app.kubernetes.io/part-of: borjie
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: voice-agent
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - borjie-app
      - borjie-staging
      - borjie-prod
