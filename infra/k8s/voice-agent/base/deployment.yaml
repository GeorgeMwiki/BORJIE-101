# =============================================================================
# voice-agent — Mr. Mwikila realtime voice agent (gpt-realtime-2 primary)
# Source: services/voice-agent (port 8080, healthcheck at /health)
# Workload class: WebSocket — sticky sessions required at the Service layer.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-agent
  labels:
    app.kubernetes.io/name: voice-agent
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: voice-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voice-agent
        app.kubernetes.io/part-of: borjie
        app.kubernetes.io/component: backend
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: voice-agent
      automountServiceAccountToken: false
      # GHCR private registry — see infra/k8s/external-secrets/ for the
      # ESO-synced `ghcr-pull` Secret. Drop this stanza if the packages
      # are flipped to public.
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: voice-agent
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: voice-agent
      containers:
        - name: voice-agent
          image: ghcr.io/georgemwiki/borjie-voice-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9464
              name: metrics
              protocol: TCP
          envFrom:
            - secretRef:
                name: voice-agent-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: HOST
              value: 0.0.0.0
            - name: LOG_LEVEL
              value: info
            - name: OTEL_SERVICE_NAME
              value: voice-agent
            - name: OTEL_METRICS_EXPORTER_PORT
              value: "9464"
          resources:
            # WebSocket pods hold long-lived connections — give enough CPU for
            # frame handling but moderate memory; provider stubs do not buffer.
            requests:
              cpu: "300m"
              memory: "384Mi"
            limits:
              cpu: "1500m"
              memory: "1.5Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/services/voice-agent/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: cache
          emptyDir:
            sizeLimit: 256Mi
      # WebSocket-friendly: allow in-flight calls to drain before shutdown.
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: voice-agent
  labels:
    app.kubernetes.io/name: voice-agent
    app.kubernetes.io/part-of: borjie
automountServiceAccountToken: false
