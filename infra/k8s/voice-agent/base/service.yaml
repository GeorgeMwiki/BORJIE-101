# =============================================================================
# voice-agent Service — WebSocket sticky sessions via sessionAffinity=ClientIP
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: voice-agent
  labels:
    app.kubernetes.io/name: voice-agent
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: voice-agent
  # Sticky sessions so a single WebSocket lifecycle lands on one pod and
  # subsequent reconnects from the same client preferably return there.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9464
      targetPort: 9464
      protocol: TCP
