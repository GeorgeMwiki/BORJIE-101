# =============================================================================
# apollo-gauntlet-runner — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/apollo-gauntlet-runner`:
#   - APOLLO_AGENT_URL              http endpoint of the agent under test
#   - APOLLO_REPORT_SINK_URL        optional sink for the GauntletResult
#   - ANTHROPIC_API_KEY             LLM-as-judge primary
#   - OPENAI_API_KEY                LLM-as-judge fallback
#   - GOOGLE_API_KEY                LLM-as-judge fallback
#   - SENTRY_DSN
#   - OTEL_EXPORTER_OTLP_ENDPOINT
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: apollo-gauntlet-runner-secrets
  labels:
    app.kubernetes.io/name: apollo-gauntlet-runner
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: apollo-gauntlet-runner-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/apollo-gauntlet-runner
