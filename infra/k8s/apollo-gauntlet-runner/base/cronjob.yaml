# =============================================================================
# apollo-gauntlet-runner — nightly scheming-detection gauntlet (CronJob, 02:00 UTC)
# Source: services/apollo-gauntlet-runner (Apollo Research 2025 pattern;
# pure batch — no HTTP surface).
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: apollo-gauntlet-runner
  labels:
    app.kubernetes.io/name: apollo-gauntlet-runner
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: worker
    app.kubernetes.io/version: "0.1.0"
spec:
  # 02:00 UTC daily — same time-band as brain-evolution-worker so the
  # nightly safety + reflection passes run in a single off-peak window.
  schedule: "0 2 * * *"
  timeZone: "Etc/UTC"
  # Skip if the previous run hasn't completed yet.
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 600
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: apollo-gauntlet-runner
        app.kubernetes.io/part-of: borjie
        app.kubernetes.io/component: worker
    spec:
      # Cap at 2h. Gauntlet runs through ~10 scenarios with LLM-as-judge
      # scoring — comfortably finishes in <30 min; the cap guards loops.
      activeDeadlineSeconds: 7200
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: apollo-gauntlet-runner
            app.kubernetes.io/part-of: borjie
            app.kubernetes.io/component: worker
        spec:
          restartPolicy: OnFailure
          serviceAccountName: apollo-gauntlet-runner
          automountServiceAccountToken: false
          imagePullSecrets:
            - name: ghcr-pull
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: apollo-gauntlet-runner
              image: ghcr.io/georgemwiki/borjie-apollo-gauntlet-runner:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: apollo-gauntlet-runner-secrets
              env:
                - name: NODE_ENV
                  value: production
                - name: APOLLO_GAUNTLET_INTERVAL_MS
                  value: "0"
                - name: APOLLO_GAUNTLET_THRESHOLD
                  value: "0.95"
                - name: OTEL_SERVICE_NAME
                  value: apollo-gauntlet-runner
              resources:
                # Scoring uses LLM-as-judge calls — CPU bursty, modest memory.
                requests:
                  cpu: "300m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "2Gi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: cache
                  mountPath: /app/services/apollo-gauntlet-runner/.cache
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 256Mi
            - name: cache
              emptyDir:
                sizeLimit: 256Mi
          terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apollo-gauntlet-runner
  labels:
    app.kubernetes.io/name: apollo-gauntlet-runner
    app.kubernetes.io/part-of: borjie
automountServiceAccountToken: false
