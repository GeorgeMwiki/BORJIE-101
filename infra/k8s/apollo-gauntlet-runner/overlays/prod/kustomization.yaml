apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-jobs

resources:
  - ../../base

images:
  - name: ghcr.io/georgemwiki/borjie-apollo-gauntlet-runner
    newTag: ${IMAGE_TAG}

patches:
  - target:
      kind: CronJob
      name: apollo-gauntlet-runner
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
