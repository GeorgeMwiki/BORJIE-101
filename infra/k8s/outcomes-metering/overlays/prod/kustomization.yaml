apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-prod

resources:
  - ../../base

images:
  - name: ghcr.io/georgemwiki/borjie-outcomes-metering
    newTag: ${IMAGE_TAG}

patches:
  - target:
      kind: Deployment
      name: outcomes-metering
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "300m"
            memory: "384Mi"
          limits:
            cpu: "2"
            memory: "1.5Gi"
      - op: replace
        path: /spec/template/spec/affinity/podAntiAffinity
        value:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: outcomes-metering
              topologyKey: kubernetes.io/hostname
