# =============================================================================
# outcomes-metering — ExternalSecret (External Secrets Operator)
# =============================================================================
# Pulls runtime env from AWS Secrets Manager via the cluster-wide store
# `borjie-aws`. ESO syncs the remote secret tree into a K8s Secret named
# `outcomes-metering-secrets`, which the Deployment mounts via envFrom.
#
# Expected remote keys at `borjie/<env>/outcomes-metering`:
#   - DATABASE_URL              postgres connection string
#   - REDIS_URL                 redis connection string (event bus + cache)
#   - BRAIN_EVENT_BUS_STREAM    stream name for OutcomeEvent consumer
#   - LANGFUSE_PUBLIC_KEY       observability
#   - LANGFUSE_SECRET_KEY       observability
#   - LANGFUSE_HOST             observability
#   - SENTRY_DSN                error reporting
#   - OTEL_EXPORTER_OTLP_ENDPOINT
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: outcomes-metering-secrets
  labels:
    app.kubernetes.io/name: outcomes-metering
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: outcomes-metering-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/outcomes-metering
