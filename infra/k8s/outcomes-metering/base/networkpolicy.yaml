# =============================================================================
# outcomes-metering — default-deny + targeted allow-list
# =============================================================================

# ---- 1. Default-deny for this app's pods only -------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outcomes-metering-default-deny
  labels:
    app.kubernetes.io/name: outcomes-metering
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: outcomes-metering
  policyTypes: [Ingress, Egress]
---
# ---- 2. Allow DNS egress ----------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outcomes-metering-allow-dns-egress
  labels:
    app.kubernetes.io/name: outcomes-metering
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: outcomes-metering
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# ---- 3. Allow ingress from api-gateway + monitoring -------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outcomes-metering-allow-ingress
  labels:
    app.kubernetes.io/name: outcomes-metering
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: outcomes-metering
  policyTypes: [Ingress]
  ingress:
    # api-gateway in the same or app namespace
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 3018
    # Prometheus scrape from the monitoring namespace — /metrics is
    # served on the app port (3018), not a dedicated metrics listener.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3018
---
# ---- 4. Allow egress to db, redis, observability, external HTTPS -----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outcomes-metering-allow-egress
  labels:
    app.kubernetes.io/name: outcomes-metering
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: outcomes-metering
  policyTypes: [Egress]
  egress:
    # Postgres
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis (brain-event-bus over Redis Streams)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Observability (OTEL collector / Loki / Prometheus)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
        - protocol: TCP
          port: 9090
    # External HTTPS (upstream AI / billing / FX feeds)
    - to: []
      ports:
        - protocol: TCP
          port: 443
