apiVersion: v1
kind: Service
metadata:
  name: owner-portal
  labels: { app.kubernetes.io/name: owner-portal }
spec:
  selector: { app.kubernetes.io/name: owner-portal }
  ports: [{ name: http, port: 80, targetPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: owner-portal
  labels:
    app.kubernetes.io/name: owner-portal
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: owner-portal }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: owner-portal
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: owner-portal-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101            # nginx user in nginx:alpine
        runAsGroup: 101
        fsGroup: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/georgemwiki/borjie-owner-portal:latest
          ports: [{ containerPort: 80, name: http }]
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"], add: ["NET_BIND_SERVICE"] }
          livenessProbe: { httpGet: { path: /health, port: 80 }, initialDelaySeconds: 10, periodSeconds: 15 }
          readinessProbe: { httpGet: { path: /health, port: 80 }, initialDelaySeconds: 3, periodSeconds: 10 }
          volumeMounts:
            - { name: cache,    mountPath: /var/cache/nginx }
            - { name: run,      mountPath: /var/run }
            - { name: tmp,      mountPath: /tmp }
      volumes:
        - { name: cache, emptyDir: {} }
        - { name: run,   emptyDir: {} }
        - { name: tmp,   emptyDir: {} }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: owner-portal-sa }
automountServiceAccountToken: false
