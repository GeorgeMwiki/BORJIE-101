# =============================================================================
# Secrets — TEMPLATE for external-secrets-operator
# =============================================================================
# This file does NOT contain plaintext secrets. It declares an ExternalSecret
# that pulls values from AWS Secrets Manager (or Azure Key Vault / GCP Secret
# Manager — swap the SecretStore kind). At sync time, ESO writes a regular
# Kubernetes Secret named `borjie-secrets` into the namespace; deployments
# reference that synthesised Secret via envFrom.
#
# Pre-requisites:
#   1. external-secrets-operator installed in the cluster
#   2. A SecretStore (or ClusterSecretStore) named `borjie-aws` pointing
#      at AWS Secrets Manager in the cluster's region with IRSA-bound auth
#   3. The remote secret `borjie/prod/app` populated with the keys below
#
# To bypass ESO for first-boot only, this file can be replaced with a literal
# Secret manifest (see secrets.example.yaml). Never check that into git.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: borjie-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: borjie-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/app
---
# Postgres / Redis credentials live in separate secrets so the StatefulSet and
# the cache deployment can mount them independently of app secrets.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/postgres
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/redis
