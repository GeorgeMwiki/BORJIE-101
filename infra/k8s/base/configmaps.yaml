apiVersion: v1
kind: ConfigMap
metadata:
  name: borjie-config
  labels: { app.kubernetes.io/part-of: borjie }
data:
  # Non-secret runtime config — secrets live in `borjie-secrets`.
  NODE_ENV: production
  LOG_LEVEL: info
  TZ: UTC
  AWS_REGION: eu-west-1
  AI_PROVIDER: anthropic
  CONSOLIDATION_INTERVAL_MS: "3600000"
  BORJIE_PII_EXTENDED: "1"
  SENTRY_ENVIRONMENT: production
  POSTHOG_HOST: https://eu.posthog.com
  OTEL_SERVICE_NAME: borjie
  CORS_ALLOWED_ORIGINS: https://borjie.com,https://admin.borjie.com,https://owners.borjie.com,https://manage.borjie.com
  API_URL: https://api.borjie.com
  FRONTEND_URL: https://borjie.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: borjie-public-config
  labels: { app.kubernetes.io/part-of: borjie }
data:
  # Only NEXT_PUBLIC_* / VITE_* — safe for browser bundles.
  NEXT_PUBLIC_API_URL: https://api.borjie.com/api/v1
  NEXT_PUBLIC_SENTRY_DSN: ""
  NEXT_PUBLIC_POSTHOG_KEY: ""
  VITE_API_URL: https://api.borjie.com/api/v1
