apiVersion: v1
kind: Service
metadata:
  name: mcp-nin
  labels: { app.kubernetes.io/name: mcp-nin }
spec:
  selector: { app.kubernetes.io/name: mcp-nin }
  ports: [{ name: mcp, port: 8080, targetPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-nin
  labels:
    app.kubernetes.io/name: mcp-nin
    app.kubernetes.io/component: mcp-server
    borjie.com/jurisdiction: NG
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: mcp-nin }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-nin
        app.kubernetes.io/component: mcp-server
    spec:
      serviceAccountName: mcp-nin-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: mcp
          image: ghcr.io/georgemwiki/borjie-mcp-nin:latest
          ports: [{ containerPort: 8080, name: mcp }]
          envFrom:
            - configMapRef: { name: borjie-config }
            - secretRef: { name: borjie-secrets }
          env:
            - { name: NODE_ENV, value: production }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          livenessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: { sizeLimit: 128Mi } }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: mcp-nin-sa }
automountServiceAccountToken: false
