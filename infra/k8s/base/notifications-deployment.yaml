apiVersion: v1
kind: Service
metadata:
  name: notifications
  labels: { app.kubernetes.io/name: notifications }
spec:
  selector: { app.kubernetes.io/name: notifications }
  ports: [{ name: http, port: 80, targetPort: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications
  labels:
    app.kubernetes.io/name: notifications
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: notifications }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifications
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: notifications-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/georgemwiki/borjie-notifications:latest
          ports: [{ containerPort: 3000, name: http }]
          envFrom:
            - configMapRef: { name: borjie-config }
            - secretRef: { name: borjie-secrets }
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "3000" }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          livenessProbe: { httpGet: { path: /healthz, port: 3000 }, initialDelaySeconds: 20, periodSeconds: 15 }
          readinessProbe: { httpGet: { path: /readyz, port: 3000 }, initialDelaySeconds: 5, periodSeconds: 10 }
          volumeMounts: [{ name: tmp, mountPath: /tmp }]
      volumes: [{ name: tmp, emptyDir: { sizeLimit: 128Mi } }]
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: notifications-sa }
automountServiceAccountToken: false
