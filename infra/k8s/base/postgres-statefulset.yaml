# =============================================================================
# Postgres StatefulSet (pgvector) — self-hosted control of the OLTP store
# =============================================================================
# NOTE: For production-grade deployments prefer a managed offering:
#   - AWS RDS (Postgres 16 + pgvector via extension parameter group)
#   - GCP Cloud SQL (pgvector via flag enable_pglogical=off, extensions=vector)
#   - Azure Database for Postgres (Flexible Server, vector extension)
# When using managed, DELETE this StatefulSet from the overlay and point
# DATABASE_URL at the managed endpoint via ExternalSecret + ConfigMap.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels: { app.kubernetes.io/name: postgres }
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: postgres }
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels: { app.kubernetes.io/name: postgres }
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: postgres }
  template:
    metadata:
      labels: { app.kubernetes.io/name: postgres }
    spec:
      serviceAccountName: postgres-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 70             # alpine postgres uid
        fsGroup: 70
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - { containerPort: 5432, name: pg }
          envFrom:
            - secretRef: { name: postgres-credentials }
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_INITDB_ARGS
              value: "--data-checksums --encoding=UTF8"
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # pg needs writable root for ssl_passphrase etc
            capabilities: { drop: ["ALL"] }
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "$(POSTGRES_USER)"] }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "$(POSTGRES_USER)"] }
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - { name: pgdata, mountPath: /var/lib/postgresql/data }
      volumes: []
  volumeClaimTemplates:
    - metadata: { name: pgdata }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 100Gi } }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-sa
  labels: { app.kubernetes.io/name: postgres }
automountServiceAccountToken: false
