apiVersion: apps/v1
kind: Deployment
metadata:
  name: consolidation-worker
  labels:
    app.kubernetes.io/name: consolidation-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: consolidation-worker }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: consolidation-worker
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: consolidation-worker-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: worker
          image: ghcr.io/georgemwiki/borjie-consolidation-worker:latest
          envFrom:
            - configMapRef: { name: borjie-config }
            - secretRef: { name: borjie-secrets }
          env:
            - name: NODE_ENV
              value: production
            - name: CONSOLIDATION_INTERVAL_MS
              value: "3600000"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          livenessProbe:
            exec: { command: ["node", "-e", "process.exit(0)"] }
            initialDelaySeconds: 30
            periodSeconds: 60
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 256Mi }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: consolidation-worker-sa
automountServiceAccountToken: false
