apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: control-plane
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app.kubernetes.io/name: api-gateway }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/component: control-plane
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: api-gateway-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile: { type: RuntimeDefault }
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels: { app.kubernetes.io/name: api-gateway }
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app.kubernetes.io/name: api-gateway }
      containers:
        - name: api-gateway
          image: ghcr.io/georgemwiki/borjie-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 4000, name: http }
            - { containerPort: 9464, name: metrics }
          envFrom:
            - configMapRef: { name: borjie-config }
            - secretRef: { name: borjie-secrets }
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: OTEL_SERVICE_NAME
              value: api-gateway
          resources:
            requests: { cpu: "500m",  memory: "512Mi" }
            limits:   { cpu: "2",     memory: "2Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
          livenessProbe:
            httpGet: { path: /healthz, port: 4000 }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /healthz, port: 4000 }
            failureThreshold: 30
            periodSeconds: 5
          volumeMounts:
            - { name: tmp,   mountPath: /tmp }
            - { name: cache, mountPath: /app/.cache }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 256Mi }
        - name: cache
          emptyDir: { sizeLimit: 512Mi }
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  labels: { app.kubernetes.io/name: api-gateway }
automountServiceAccountToken: false
