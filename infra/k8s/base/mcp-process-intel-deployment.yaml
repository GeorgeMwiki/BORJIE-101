apiVersion: v1
kind: Service
metadata:
  name: mcp-process-intel
  labels: { app.kubernetes.io/name: mcp-process-intel }
spec:
  selector: { app.kubernetes.io/name: mcp-process-intel }
  ports:
    - { name: mcp, port: 8080, targetPort: 8080 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-process-intel
  labels:
    app.kubernetes.io/name: mcp-process-intel
    app.kubernetes.io/component: mcp-server
    # AGPL segregation marker — see services/mcp-server-process-intel/Dockerfile
    borjie.com/license: AGPL-process-boundary
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: mcp-process-intel }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-process-intel
        app.kubernetes.io/component: mcp-server
    spec:
      serviceAccountName: mcp-process-intel-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000   # node user from base image
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: mcp
          image: ghcr.io/georgemwiki/borjie-mcp-process-intel:latest
          ports:
            - { containerPort: 8080, name: mcp }
          envFrom:
            - configMapRef: { name: borjie-config }
            - secretRef: { name: borjie-secrets }
          env:
            - name: NODE_ENV
              value: production
            - name: PYTHON_BIN
              value: /opt/pm4py-venv/bin/python
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          livenessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - { name: tmp,    mountPath: /tmp }
            - { name: pyvenv-tmp, mountPath: /opt/pm4py-venv/var }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 512Mi }
        - name: pyvenv-tmp
          emptyDir: { sizeLimit: 128Mi }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-process-intel-sa
automountServiceAccountToken: false
