# =============================================================================
# Network policies — deny-all baseline + targeted allow-lists
# =============================================================================
# Assumes a CNI that enforces NetworkPolicy (Calico, Cilium, Antrea, etc).
# Default posture: everything denied. We open precisely what each component
# needs and nothing more.
# =============================================================================

# ---- 1. Default-deny ingress + egress ---------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# ---- 2. Allow DNS egress for every pod --------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-dns-egress }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# ---- 3. api-gateway: in from ingress; out to data plane + MCP + library svcs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: api-gateway }
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: api-gateway }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
      ports:
        - { protocol: TCP, port: 4000 }
    - from:
        - podSelector:
            matchLabels: { app.kubernetes.io/component: frontend }
      ports:
        - { protocol: TCP, port: 4000 }
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: monitoring }
      ports:
        - { protocol: TCP, port: 9464 }
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/name: postgres } }
      ports: [{ protocol: TCP, port: 5432 }]
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/name: redis } }
      ports: [{ protocol: TCP, port: 6379 }]
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: mcp-server } }
      ports: [{ protocol: TCP, port: 8080 }]
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: backend } }
      ports: [{ protocol: TCP, port: 3000 }]
    # External HTTPS for upstream AI / payment providers (cluster egress firewall is the second line)
    - to: []
      ports:
        - { protocol: TCP, port: 443 }
---
# ---- 4. Backends (library services): in from api-gateway; out to data plane -
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: backends }
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: backend }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/name: api-gateway } }
      ports: [{ protocol: TCP, port: 3000 }]
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/name: postgres } }
      ports: [{ protocol: TCP, port: 5432 }]
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/name: redis } }
      ports: [{ protocol: TCP, port: 6379 }]
    - to: []
      ports: [{ protocol: TCP, port: 443 }]
---
# ---- 5. MCP servers: in from api-gateway only -------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: mcp-servers }
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: mcp-server }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/name: api-gateway } }
      ports: [{ protocol: TCP, port: 8080 }]
  egress:
    - to: []
      ports: [{ protocol: TCP, port: 443 }]
---
# ---- 6. Frontends: in from ingress; out to api-gateway ----------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: frontends }
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: frontend }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
      ports:
        - { protocol: TCP, port: 80 }
        - { protocol: TCP, port: 3000 }
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/name: api-gateway } }
      ports: [{ protocol: TCP, port: 4000 }]
---
# ---- 7. Postgres / Redis: ingress only from declared callers ---------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: postgres }
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: postgres }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/name: api-gateway } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: backend } }
        - podSelector: { matchLabels: { app.kubernetes.io/name: consolidation-worker } }
      ports: [{ protocol: TCP, port: 5432 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: redis }
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: redis }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/name: api-gateway } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: backend } }
      ports: [{ protocol: TCP, port: 6379 }]
