apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-staging

resources:
  - ../../base

images:
  - name: ghcr.io/georgemwiki/borjie-mcp-server-process-intel
    newTag: staging

patches:
  - target:
      kind: Deployment
      name: mcp-server-process-intel
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "100m"
            memory: "192Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
  - target:
      kind: ExternalSecret
      name: mcp-server-process-intel-secrets
    patch: |-
      - op: replace
        path: /spec/dataFrom/0/extract/key
        value: borjie/staging/mcp-server-process-intel
