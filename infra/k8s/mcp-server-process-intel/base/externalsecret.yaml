# =============================================================================
# mcp-server-process-intel — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/mcp-server-process-intel`:
#   - MCP_TENANT_ALLOWLIST           CRITICAL-4 (JSON allowlist)
#   - PYTHON_BIN                     optional override (defaults to
#                                    /opt/pm4py-venv/bin/python)
#   - OTEL_EXPORTER_OTLP_ENDPOINT
#   - SENTRY_DSN
# No external API keys — pm4py runs entirely offline.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mcp-server-process-intel-secrets
  labels:
    app.kubernetes.io/name: mcp-server-process-intel
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: mcp-server-process-intel-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/mcp-server-process-intel
