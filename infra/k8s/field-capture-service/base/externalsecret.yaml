apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: field-capture-service-secrets
  labels:
    app.kubernetes.io/name: field-capture-service
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: field-capture-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: SUPABASE_DB_URL
      remoteRef:
        key: borjie/field-capture-service/SUPABASE_DB_URL
    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: borjie/field-capture-service/S3_ACCESS_KEY_ID
    - secretKey: S3_SECRET_ACCESS_KEY
      remoteRef:
        key: borjie/field-capture-service/S3_SECRET_ACCESS_KEY
    - secretKey: S3_BUCKET
      remoteRef:
        key: borjie/field-capture-service/S3_BUCKET
