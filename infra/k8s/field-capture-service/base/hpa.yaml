apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: field-capture-service
  labels:
    app.kubernetes.io/name: field-capture-service
    app.kubernetes.io/part-of: borjie
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: field-capture-service
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
