apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: field-capture-service
  labels:
    app.kubernetes.io/name: field-capture-service
    app.kubernetes.io/part-of: borjie
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: field-capture-service
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
