apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-prod

resources:
  - ../../base

images:
  - name: ghcr.io/georgemwiki/borjie-mcp-server-nin
    newTag: ${IMAGE_TAG}

patches:
  - target:
      kind: Deployment
      name: mcp-server-nin
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "150m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "768Mi"
