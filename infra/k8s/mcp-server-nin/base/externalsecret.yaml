# =============================================================================
# mcp-server-nin — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/mcp-server-nin`:
#   - MCP_TENANT_ALLOWLIST           CRITICAL-4 (JSON allowlist)
#   - NIN_API_KEY                    NIMC NIVS credentials
#   - NIN_API_SECRET                 NIMC NIVS HMAC secret
#   - NIN_BASE_URL                   optional override (defaults to NIMC prod)
#   - OTEL_EXPORTER_OTLP_ENDPOINT
#   - SENTRY_DSN
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mcp-server-nin-secrets
  labels:
    app.kubernetes.io/name: mcp-server-nin
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: mcp-server-nin-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/mcp-server-nin
