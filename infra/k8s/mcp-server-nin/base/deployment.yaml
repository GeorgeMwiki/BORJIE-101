# =============================================================================
# mcp-server-nin — Nigeria NIN biometric KYC MCP server (Deployment, stdio)
# Source: services/mcp-server-nin
#   - Pure stdio MCP server (Anthropic default transport). Wraps NIMC
#     NIVS REST API behind a single `nin.verify_nin` tool. See
#     services/api-gateway/src/composition/mcp-client-process-intel.ts
#     for the HTTP/SSE-bridge pattern api-gateway expects.
#   - CRITICAL-4 per-tenant allowlist guard enforced — default "deny
#     all" when MCP_TENANT_ALLOWLIST is unset.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-nin
  labels:
    app.kubernetes.io/name: mcp-server-nin
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-server-nin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-server-nin
        app.kubernetes.io/part-of: borjie
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/version: "0.1.0"
    spec:
      serviceAccountName: mcp-server-nin
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-server-nin
          image: ghcr.io/georgemwiki/borjie-mcp-server-nin:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: mcp-server-nin-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: OTEL_SERVICE_NAME
              value: mcp-server-nin
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server-nin
  labels:
    app.kubernetes.io/name: mcp-server-nin
    app.kubernetes.io/part-of: borjie
automountServiceAccountToken: false
