---
# Allow every borjie pod to reach kube-dns. Without this, name
# resolution silently fails and every other allow rule appears
# broken. This is the very first rule we add on top of the
# default-deny.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: borjie
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/managed-by: helm
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
