# =============================================================================
# borjie-aws — ClusterSecretStore (External Secrets Operator + AWS SM)
# =============================================================================
# This is the cluster-wide secret backend that every ExternalSecret in this
# repository references. All 7 services added in d62a3394 (brain-evolution-
# worker, parcel-service, voice-agent, onboarding-orchestrator, outcomes-
# metering, scientific-discovery-sidecar, document-render) plus existing
# services pull their runtime secrets through this store.
#
# Provider:    AWS Secrets Manager
# Region:      af-south-1 (Cape Town — TZ-closest AWS region for low-latency
#              control-plane calls; data plane secrets are pulled at pod
#              start and cached in-cluster for `refreshInterval`).
# AuthN:       IRSA via projected service-account token (sts:AssumeRoleWith-
#              WebIdentity). The `external-secrets` ServiceAccount carries
#              an IRSA annotation pointing at the IAM role; the role's trust
#              policy must allow the cluster's OIDC provider for that SA.
#
# Secret-tree layout (referenced by ExternalSecret extract keys):
#   borjie/<env>/<service>     per-service env (DATABASE_URL, API keys)
#   borjie/<env>/postgres      shared DB creds (managed-postgres mode)
#   borjie/<env>/redis         shared cache creds
#   borjie/shared/ghcr-pull    Docker config JSON for ghcr.io image pull
#
# See README.md in this directory for the IAM trust + permission policy that
# the IRSA role must carry.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: borjie-aws
  labels:
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/managed-by: kustomize
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
