# =============================================================================
# external-secrets ServiceAccount — IRSA binding for AWS Secrets Manager
# =============================================================================
# The `external-secrets` namespace is where the External Secrets Operator
# controller runs (typically installed via Helm chart `external-secrets/
# external-secrets`). This SA is the identity the operator uses to call
# AWS Secrets Manager via IRSA when the ClusterSecretStore `borjie-aws`
# triggers a sync.
#
# Operator install (run once, outside Kustomize):
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace
#
# After install, `kubectl apply -f service-account.yaml -f cluster-secret-
# store-aws.yaml` finishes the wiring (the chart creates the SA but does
# NOT add the IRSA annotation — that's what this manifest adds).
#
# REPLACE: ACCOUNT_ID with the AWS account that owns the IAM role.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
  labels:
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # IRSA — IAM Role for Service Accounts. The role's trust policy must
    # allow sts:AssumeRoleWithWebIdentity from the cluster's OIDC provider
    # scoped to this SA (system:serviceaccount:external-secrets:external-
    # secrets). See README.md for the policy templates.
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/eks-external-secrets
