# =============================================================================
# ghcr-pull — image-pull Secret for ghcr.io/georgemwiki/borjie-* images
# =============================================================================
# Until the GHCR packages are made public, every Deployment + CronJob that
# pulls a ghcr.io/georgemwiki/borjie-* image must reference an
# imagePullSecrets entry named `ghcr-pull`. This ExternalSecret syncs the
# Docker config JSON from AWS Secrets Manager (at the path
# `borjie/shared/ghcr-pull-token`) into a kubernetes.io/dockerconfigjson
# Secret in every namespace that runs application workloads.
#
# Secret payload in AWS Secrets Manager
#   key:   borjie/shared/ghcr-pull-token
#   value: <Docker config JSON, e.g.
#           {"auths":{"ghcr.io":{"auth":"<base64 user:PAT>"}}}>
#   The PAT needs `read:packages` scope only.
#
# Each of the 4 application namespaces (borjie-app, borjie-prod,
# borjie-staging, borjie-jobs) needs a copy. Kustomize cannot fan
# out a single ExternalSecret to multiple namespaces, so we declare 4
# identical-but-namespaced instances below.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull
  namespace: borjie-app
  labels:
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: ghcr-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: borjie/shared/ghcr-pull-token
        property: dockerconfigjson
---
