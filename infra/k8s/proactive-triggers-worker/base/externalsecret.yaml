# =============================================================================
# proactive-triggers-worker — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/proactive-triggers-worker`:
#   - DATABASE_URL
#   - REDIS_URL
#   - API_GATEWAY_URL                 trigger sink endpoint
#   - API_GATEWAY_SIGNING_KEY         agent-platform A2A auth
#   - OTEL_EXPORTER_OTLP_ENDPOINT
#   - SENTRY_DSN
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: proactive-triggers-worker-secrets
  labels:
    app.kubernetes.io/name: proactive-triggers-worker
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: proactive-triggers-worker-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/proactive-triggers-worker
