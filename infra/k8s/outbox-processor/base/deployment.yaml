# =============================================================================
# outbox-processor — transactional outbox drainer (Deployment, no HTTP)
# Source: services/outbox-processor
#   - Long-running setInterval supervisor that calls EventBus.processOutbox()
#     on a fixed cadence (`OUTBOX_INTERVAL_MS`, default 5000ms).
#   - REFUSES TO START unless OUTBOX_STORE_TYPE = `postgres` or `redis`
#     (see src/index.ts audit DA3 guard). Default ImagePullPolicy ships
#     `replicas: 0` until operators wire a shared store; this manifest
#     defaults to `replicas: 1` because the staging/prod ExternalSecrets
#     are expected to set OUTBOX_STORE_TYPE=postgres.
#   - No HTTP surface; observability via OTLP only.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-processor
  labels:
    app.kubernetes.io/name: outbox-processor
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: worker
    app.kubernetes.io/version: "0.1.0"
spec:
  # Singleton — outbox claims rows transactionally so multiple replicas
  # are safe in principle, but the audit DA3 path keeps this at 1 until
  # leader-election or row-level lease is wired.
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: outbox-processor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: outbox-processor
        app.kubernetes.io/part-of: borjie
        app.kubernetes.io/component: worker
        app.kubernetes.io/version: "0.1.0"
    spec:
      serviceAccountName: outbox-processor
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: outbox-processor
          image: ghcr.io/georgemwiki/borjie-outbox-processor:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: outbox-processor-secrets
          env:
            - name: NODE_ENV
              value: production
            # MUST be `postgres` or `redis` — the entrypoint exits with
            # code 1 otherwise (audit DA3 guard). The actual value is
            # set in the ExternalSecret payload so operators can flip
            # store backends without touching this manifest.
            - name: OUTBOX_INTERVAL_MS
              value: "5000"
            - name: OTEL_SERVICE_NAME
              value: outbox-processor
          resources:
            # Tight — the worker only drains rows + publishes events.
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/services/outbox-processor/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
        - name: cache
          emptyDir:
            sizeLimit: 128Mi
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: outbox-processor
  labels:
    app.kubernetes.io/name: outbox-processor
    app.kubernetes.io/part-of: borjie
automountServiceAccountToken: false
