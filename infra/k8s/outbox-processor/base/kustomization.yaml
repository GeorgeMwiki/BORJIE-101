# =============================================================================
# outbox-processor base — Deployment + NetworkPolicy + ExternalSecret
# =============================================================================
# Singleton worker — no HTTP / Service / HPA / PDB.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-app

commonLabels:
  app.kubernetes.io/part-of: borjie
  app.kubernetes.io/managed-by: kustomize

resources:
  - deployment.yaml
  - networkpolicy.yaml
  - externalsecret.yaml

images:
  - name: ghcr.io/georgemwiki/borjie-outbox-processor
    newTag: latest
