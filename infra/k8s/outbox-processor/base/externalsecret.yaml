# =============================================================================
# outbox-processor — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/outbox-processor`:
#   - OUTBOX_STORE_TYPE              MUST be `postgres` or `redis`
#                                    (audit DA3 — entrypoint exits otherwise)
#   - DATABASE_URL                   postgres connection (when store=postgres)
#   - REDIS_URL                      redis connection (when store=redis)
#   - OUTBOX_INTERVAL_MS             optional override (default 5000)
#   - OTEL_EXPORTER_OTLP_ENDPOINT
#   - SENTRY_DSN
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: outbox-processor-secrets
  labels:
    app.kubernetes.io/name: outbox-processor
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: outbox-processor-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/outbox-processor
