# =============================================================================
# outbox-processor — default-deny + targeted egress allow-list
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outbox-processor-default-deny
  labels:
    app.kubernetes.io/name: outbox-processor
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: outbox-processor
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outbox-processor-allow-dns-egress
  labels:
    app.kubernetes.io/name: outbox-processor
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: outbox-processor
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: outbox-processor-allow-egress
  labels:
    app.kubernetes.io/name: outbox-processor
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: outbox-processor
  policyTypes: [Egress]
  egress:
    # Postgres — outbox store backend (when OUTBOX_STORE_TYPE=postgres)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis — outbox store backend (when OUTBOX_STORE_TYPE=redis)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # External HTTPS — webhook + downstream delivery surfaces
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Observability
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
