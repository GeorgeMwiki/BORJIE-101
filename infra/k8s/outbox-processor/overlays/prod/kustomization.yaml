apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-prod

resources:
  - ../../base

images:
  - name: ghcr.io/georgemwiki/borjie-outbox-processor
    newTag: ${IMAGE_TAG}

patches:
  - target:
      kind: Deployment
      name: outbox-processor
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "200m"
            memory: "384Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
