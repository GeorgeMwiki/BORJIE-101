# =============================================================================
# brain-evolution-worker — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/brain-evolution-worker`:
#   - DATABASE_URL                  postgres connection string
#   - ANTHROPIC_API_KEY             reflection jury LLM #1
#   - OPENAI_API_KEY                reflection jury LLM #2
#   - GOOGLE_API_KEY                reflection jury LLM #3
#   - BRAIN_EVOLUTION_JURISDICTION  default fallback for constitution verifier
#   - SENTRY_DSN
#   - OTEL_EXPORTER_OTLP_ENDPOINT
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: brain-evolution-worker-secrets
  labels:
    app.kubernetes.io/name: brain-evolution-worker
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: brain-evolution-worker-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/brain-evolution-worker
