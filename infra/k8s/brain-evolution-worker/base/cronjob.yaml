# =============================================================================
# brain-evolution-worker — nightly sleep-time consolidator (CronJob, 02:00 UTC)
# Source: services/brain-evolution-worker (Letta sleep-time pattern; pure
# batch — no HTTP surface).
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: brain-evolution-worker
  labels:
    app.kubernetes.io/name: brain-evolution-worker
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: worker
    app.kubernetes.io/version: "0.1.0"
spec:
  # 02:00 UTC daily.
  schedule: "0 2 * * *"
  timeZone: "Etc/UTC"
  # Skip if the previous run hasn't completed yet — overlapping nightly
  # sweeps would re-process the same traces.
  concurrencyPolicy: Forbid
  # Keep the last 3 successful runs + 5 failed runs for audit.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  # If the cluster was down, run the next slot only — never play catch-up.
  startingDeadlineSeconds: 600
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: brain-evolution-worker
        app.kubernetes.io/part-of: borjie
        app.kubernetes.io/component: worker
    spec:
      # Cap the run at 4h. Sleep-time consolidation should comfortably finish
      # in <1h per tenant; the cap guards a pathological loop.
      activeDeadlineSeconds: 14400
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: brain-evolution-worker
            app.kubernetes.io/part-of: borjie
            app.kubernetes.io/component: worker
        spec:
          restartPolicy: OnFailure
          serviceAccountName: brain-evolution-worker
          automountServiceAccountToken: false
          # GHCR private registry — ESO syncs the `ghcr-pull` Secret in
          # every workload namespace; see infra/k8s/external-secrets/.
          # When the packages flip to public, this stanza becomes a no-op
          # and can be removed.
          imagePullSecrets:
            - name: ghcr-pull
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: brain-evolution-worker
              image: ghcr.io/georgemwiki/borjie-brain-evolution-worker:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: brain-evolution-worker-secrets
              env:
                - name: NODE_ENV
                  value: production
                # Run-once mode — CronJob fires the entrypoint, the worker
                # runs `runNightlySweep` once, and exits.
                - name: BRAIN_EVOLUTION_INTERVAL_MS
                  value: "0"
                - name: OTEL_SERVICE_NAME
                  value: brain-evolution-worker
              resources:
                # Cron sweep is memory-heavy (loading the day's traces + the
                # 3-LLM reflection jury context); CPU is bursty.
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: cache
                  mountPath: /app/services/brain-evolution-worker/.cache
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
            - name: cache
              emptyDir:
                sizeLimit: 1Gi
          terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: brain-evolution-worker
  labels:
    app.kubernetes.io/name: brain-evolution-worker
    app.kubernetes.io/part-of: borjie
automountServiceAccountToken: false
