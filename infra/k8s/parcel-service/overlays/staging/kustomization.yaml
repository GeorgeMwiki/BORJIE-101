apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-staging

resources:
  - ../../base

images:
  - name: ghcr.io/georgemwiki/borjie-parcel-service
    newTag: staging

patches:
  - target:
      kind: Deployment
      name: parcel-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "150m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
  - target:
      kind: HorizontalPodAutoscaler
      name: parcel-service
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      kind: ExternalSecret
      name: parcel-service-secrets
    patch: |-
      - op: replace
        path: /spec/dataFrom/0/extract/key
        value: borjie/staging/parcel-service
