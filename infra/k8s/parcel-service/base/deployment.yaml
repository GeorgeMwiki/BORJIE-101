# =============================================================================
# parcel-service — Fastify REST + MCP wrapper over PostGIS parcels
# Source: services/parcel-service (port 3017, healthz at /healthz)
# Workload class: GIS — heavier memory for geocoder + PostGIS round trips.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parcel-service
  labels:
    app.kubernetes.io/name: parcel-service
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: parcel-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: parcel-service
        app.kubernetes.io/part-of: borjie
        app.kubernetes.io/component: backend
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9464"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: parcel-service
      automountServiceAccountToken: false
      # GHCR private registry — see infra/k8s/external-secrets/.
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: parcel-service
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: parcel-service
      containers:
        - name: parcel-service
          image: ghcr.io/georgemwiki/borjie-parcel-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3017
              name: http
              protocol: TCP
            - containerPort: 9464
              name: metrics
              protocol: TCP
          envFrom:
            - secretRef:
                name: parcel-service-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3017"
            - name: HOST
              value: 0.0.0.0
            - name: OTEL_SERVICE_NAME
              value: parcel-service
            - name: OTEL_METRICS_EXPORTER_PORT
              value: "9464"
          resources:
            # GIS workload — heavier memory for PostGIS result buffers and
            # geocoder candidate scoring; CPU bursty during snap-to-building.
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3017
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3017
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 3017
            failureThreshold: 30
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /repo/services/parcel-service/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
        - name: cache
          emptyDir:
            sizeLimit: 512Mi
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: parcel-service
  labels:
    app.kubernetes.io/name: parcel-service
    app.kubernetes.io/part-of: borjie
automountServiceAccountToken: false
