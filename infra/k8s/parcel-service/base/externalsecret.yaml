# =============================================================================
# parcel-service — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/parcel-service`:
#   - PARCEL_DB_URL              PostGIS connection string
#   - GOOGLE_MAPS_API_KEY        Geocoder chain primary
#   - WHAT3WORDS_API_KEY         Geocoder chain
#   - NOMINATIM_BASE_URL         Geocoder chain fallback
#   - MCP_TENANT_ALLOWLIST       JSON map of tenant ids per MCP tool
#   - SENTRY_DSN
#   - OTEL_EXPORTER_OTLP_ENDPOINT
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: parcel-service-secrets
  labels:
    app.kubernetes.io/name: parcel-service
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: parcel-service-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/parcel-service
