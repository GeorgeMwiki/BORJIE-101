apiVersion: v1
kind: Service
metadata:
  name: document-render
  labels:
    app.kubernetes.io/name: document-render
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: renderer
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: document-render
  ports:
    - name: carbone
      port: 4000
      targetPort: 4000
      protocol: TCP
    - name: typst
      port: 8001
      targetPort: 8001
      protocol: TCP
    - name: puppeteer
      port: 8002
      targetPort: 8002
      protocol: TCP
