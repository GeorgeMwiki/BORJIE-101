# =============================================================================
# document-render — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/document-render`:
#   - CARBONE_LICENSE              optional Carbone Studio license
#   - SENTRY_DSN
#   - OTEL_EXPORTER_OTLP_ENDPOINT
#   - S3_BUCKET                    output bucket for rendered docs (if used)
#   - AWS_REGION
# Most config is non-secret (ports, paths) and set inline in deployment.yaml.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: document-render-secrets
  labels:
    app.kubernetes.io/name: document-render
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: document-render-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/document-render
