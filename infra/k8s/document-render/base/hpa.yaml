apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: document-render
  labels:
    app.kubernetes.io/name: document-render
    app.kubernetes.io/part-of: borjie
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: document-render
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      # Renders are bursty; keep capacity warm so we never miss a queue spike.
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
