apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-prod

resources:
  - ../../base

images:
  - name: ghcr.io/georgemwiki/borjie-document-render
    newTag: ${IMAGE_TAG}

patches:
  - target:
      kind: Deployment
      name: document-render
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "750m"
            memory: "1.5Gi"
          limits:
            cpu: "3"
            memory: "4Gi"
      - op: replace
        path: /spec/template/spec/affinity/podAntiAffinity
        value:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: document-render
              topologyKey: kubernetes.io/hostname
