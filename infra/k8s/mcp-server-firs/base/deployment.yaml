# =============================================================================
# mcp-server-firs — Nigeria FIRS / NRS tax MCP server (Deployment, stdio)
# Source: services/mcp-server-firs
#   - Pure stdio MCP server (Anthropic default transport). When the
#     api-gateway connects via `MCP_FIRS_URL` an HTTP/SSE bridge is
#     expected (see services/api-gateway/src/composition/mcp-client-
#     process-intel.ts for the pattern). Until that bridge ships, this
#     Deployment keeps the process alive so a sidecar HTTP wrapper can
#     pipe stdio out.
#   - Per-tenant allowlist guard MUST be set via `MCP_TENANT_ALLOWLIST`
#     (CRITICAL-4). Default "deny all" if unset.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-firs
  labels:
    app.kubernetes.io/name: mcp-server-firs
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-server-firs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-server-firs
        app.kubernetes.io/part-of: borjie
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/version: "0.1.0"
    spec:
      serviceAccountName: mcp-server-firs
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-server-firs
          image: ghcr.io/georgemwiki/borjie-mcp-server-firs:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: mcp-server-firs-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: OTEL_SERVICE_NAME
              value: mcp-server-firs
            # CRITICAL-4 — Per-tenant allowlist source-of-truth lives in
            # the ExternalSecret payload; the default "deny all" applies
            # if the key is missing.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server-firs
  labels:
    app.kubernetes.io/name: mcp-server-firs
    app.kubernetes.io/part-of: borjie
automountServiceAccountToken: false
