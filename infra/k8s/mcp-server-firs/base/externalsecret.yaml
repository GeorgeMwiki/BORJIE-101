# =============================================================================
# mcp-server-firs — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/mcp-server-firs`:
#   - MCP_TENANT_ALLOWLIST           CRITICAL-4 (JSON allowlist)
#   - FIRS_API_KEY                   TaxProMax API
#   - FIRS_BASE_URL                  optional override
#   - NRS_API_KEY                    NRS Tax ID Portal
#   - OTEL_EXPORTER_OTLP_ENDPOINT
#   - SENTRY_DSN
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mcp-server-firs-secrets
  labels:
    app.kubernetes.io/name: mcp-server-firs
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: mcp-server-firs-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/mcp-server-firs
