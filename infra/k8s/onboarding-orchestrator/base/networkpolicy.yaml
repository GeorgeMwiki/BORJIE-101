# =============================================================================
# onboarding-orchestrator — default-deny + targeted allow-list
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: onboarding-orchestrator-default-deny
  labels:
    app.kubernetes.io/name: onboarding-orchestrator
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: onboarding-orchestrator
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: onboarding-orchestrator-allow-dns-egress
  labels:
    app.kubernetes.io/name: onboarding-orchestrator
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: onboarding-orchestrator
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: onboarding-orchestrator-allow-ingress
  labels:
    app.kubernetes.io/name: onboarding-orchestrator
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: onboarding-orchestrator
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 3014
    # Prometheus scrape from the monitoring namespace — /metrics is
    # served on the app port (3014), not a dedicated metrics listener.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3014
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: onboarding-orchestrator-allow-egress
  labels:
    app.kubernetes.io/name: onboarding-orchestrator
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: onboarding-orchestrator
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # External HTTPS — multi-model extractor (Anthropic / OpenAI / Google)
    - to: []
      ports:
        - protocol: TCP
          port: 443
