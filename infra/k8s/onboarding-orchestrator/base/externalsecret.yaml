# =============================================================================
# onboarding-orchestrator — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/onboarding-orchestrator`:
#   - DATABASE_URL                 postgres connection string
#   - REDIS_URL                    optional session cache
#   - ANTHROPIC_API_KEY            multi-model extractor
#   - OPENAI_API_KEY               multi-model extractor
#   - GOOGLE_API_KEY               multi-model extractor
#   - ONBOARDING_BOOTSTRAP_TENANT  bootstrap tenant scope
#   - SENTRY_DSN
#   - OTEL_EXPORTER_OTLP_ENDPOINT
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: onboarding-orchestrator-secrets
  labels:
    app.kubernetes.io/name: onboarding-orchestrator
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: onboarding-orchestrator-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/onboarding-orchestrator
