apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scientific-discovery-sidecar
  labels:
    app.kubernetes.io/name: scientific-discovery-sidecar
    app.kubernetes.io/part-of: borjie
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scientific-discovery-sidecar
  minReplicas: 2
  # Heavy-compute pods (2 CPU / 4Gi each) are expensive — cap aggressively.
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    # Scale up conservatively — each pod takes ~30s of CPU to warm Python +
    # DoWhy/Tigramite imports; spinning up a stampede wastes node capacity.
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
