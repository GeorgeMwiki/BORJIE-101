# =============================================================================
# scientific-discovery-sidecar — Python/FastAPI, DoWhy + Tigramite
# Source: services/scientific-discovery-sidecar (port 8000, /health)
# Workload class: heavy-compute — 2 CPU / 4Gi request per spec.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scientific-discovery-sidecar
  labels:
    app.kubernetes.io/name: scientific-discovery-sidecar
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: sidecar
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: scientific-discovery-sidecar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scientific-discovery-sidecar
        app.kubernetes.io/part-of: borjie
        app.kubernetes.io/component: sidecar
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: scientific-discovery-sidecar
      automountServiceAccountToken: false
      # GHCR private registry — see infra/k8s/external-secrets/.
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        # The Dockerfile creates the `app` user without a fixed UID; restricted
        # PSS requires us to pin one. The image's app user is allocated above
        # 100; we override at the K8s layer to a stable UID.
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: scientific-discovery-sidecar
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: scientific-discovery-sidecar
      containers:
        - name: scientific-discovery-sidecar
          image: ghcr.io/georgemwiki/borjie-scientific-discovery-sidecar:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - secretRef:
                name: scientific-discovery-sidecar-secrets
          env:
            - name: DISCOVERY_SIDECAR_HOST
              value: 0.0.0.0
            - name: DISCOVERY_SIDECAR_PORT
              value: "8000"
            - name: DISCOVERY_SIDECAR_LOG_LEVEL
              value: info
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: OTEL_SERVICE_NAME
              value: scientific-discovery-sidecar
          resources:
            # Heavy compute — spec calls for 2 CPU / 4Gi requests.
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            # Heavier startup — DoWhy + Tigramite + statsmodels import is slow.
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 60
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/app
            - name: matplotlib-cache
              mountPath: /home/app/.cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: home
          emptyDir:
            sizeLimit: 256Mi
        - name: matplotlib-cache
          emptyDir:
            sizeLimit: 256Mi
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scientific-discovery-sidecar
  labels:
    app.kubernetes.io/name: scientific-discovery-sidecar
    app.kubernetes.io/part-of: borjie
automountServiceAccountToken: false
