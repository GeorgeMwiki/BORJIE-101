# =============================================================================
# scientific-discovery-sidecar — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/scientific-discovery-sidecar`:
#   - DISCOVERY_SIDECAR_BOOTSTRAP_SAMPLES
#   - DISCOVERY_SIDECAR_DOWHY_SIMULATIONS
#   - DISCOVERY_SIDECAR_PCMCI_TAU_MAX
#   - DISCOVERY_SIDECAR_PCMCI_ALPHA
#   - DISCOVERY_SIDECAR_MAX_ROWS
#   - DISCOVERY_SIDECAR_CORS_ORIGINS
#   - SENTRY_DSN
#   - OTEL_EXPORTER_OTLP_ENDPOINT
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: scientific-discovery-sidecar-secrets
  labels:
    app.kubernetes.io/name: scientific-discovery-sidecar
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: scientific-discovery-sidecar-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/scientific-discovery-sidecar
