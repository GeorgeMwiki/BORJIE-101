# =============================================================================
# mcp-server-opay — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/mcp-server-opay`:
#   - MCP_TENANT_ALLOWLIST           CRITICAL-4 (JSON allowlist)
#   - OPAY_PUBLIC_KEY                OPay Merchant API public key
#   - OPAY_SECRET_KEY                OPay Merchant API secret
#   - OPAY_MERCHANT_ID               OPay merchant identifier
#   - OPAY_BASE_URL                  optional override
#   - OTEL_EXPORTER_OTLP_ENDPOINT
#   - SENTRY_DSN
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mcp-server-opay-secrets
  labels:
    app.kubernetes.io/name: mcp-server-opay
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: mcp-server-opay-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/mcp-server-opay
