apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payments-ledger
  labels:
    app.kubernetes.io/name: payments-ledger
    app.kubernetes.io/part-of: borjie
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payments-ledger
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    # Money path — scale up briskly during paydays and statement-day
    # bursts; scale down gently so jobs in progress are not yanked.
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 50
          periodSeconds: 120
