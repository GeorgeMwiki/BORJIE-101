# =============================================================================
# payments-ledger — default-deny + targeted allow-list
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payments-ledger-default-deny
  labels:
    app.kubernetes.io/name: payments-ledger
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payments-ledger
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payments-ledger-allow-dns-egress
  labels:
    app.kubernetes.io/name: payments-ledger
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payments-ledger
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payments-ledger-allow-ingress
  labels:
    app.kubernetes.io/name: payments-ledger
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payments-ledger
  policyTypes: [Ingress]
  ingress:
    # api-gateway calls the ledger via the internal Service
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 3001
    # ingress-nginx forwards M-Pesa / Stripe webhook callbacks
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3001
    # Prometheus scrape from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9464
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payments-ledger-allow-egress
  labels:
    app.kubernetes.io/name: payments-ledger
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payments-ledger
  policyTypes: [Egress]
  egress:
    # Postgres — ledger entries + repositories
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis — idempotency + event-publisher backplane
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # External HTTPS — Stripe + Safaricom Daraja (M-Pesa) APIs
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Observability
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
