# =============================================================================
# payments-ledger Service — ClusterIP for api-gateway + provider webhooks
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: payments-ledger
  labels:
    app.kubernetes.io/name: payments-ledger
    app.kubernetes.io/part-of: borjie
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: payments-ledger
  ports:
    - name: http
      port: 80
      targetPort: 3001
      protocol: TCP
    - name: metrics
      port: 9464
      targetPort: 9464
      protocol: TCP
