# =============================================================================
# payments-ledger — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/payments-ledger`:
#   - DATABASE_URL                   postgres connection
#   - REDIS_URL                      idempotency + event-publisher
#   - STRIPE_SECRET_KEY              Stripe API
#   - STRIPE_WEBHOOK_SECRET          Stripe webhook signature
#   - MPESA_ENVIRONMENT              MUST be `sandbox` or `production`
#                                    (audit P50 — entrypoint throws on
#                                    silent defaults in prod)
#   - MPESA_CONSUMER_KEY             Daraja API
#   - MPESA_CONSUMER_SECRET
#   - MPESA_PASSKEY
#   - MPESA_SHORTCODE
#   - PLATFORM_FEE_BPS               required in prod (audit P50)
#   - SUPABASE_JWT_SECRET            for JWT verification on inbound routes
#   - OTEL_EXPORTER_OTLP_ENDPOINT
#   - SENTRY_DSN
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payments-ledger-secrets
  labels:
    app.kubernetes.io/name: payments-ledger
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: payments-ledger-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/payments-ledger
