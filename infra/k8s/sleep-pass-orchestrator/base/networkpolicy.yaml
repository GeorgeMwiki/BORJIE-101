# =============================================================================
# sleep-pass-orchestrator — default-deny + targeted allow-list
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sleep-pass-orchestrator-default-deny
  labels:
    app.kubernetes.io/name: sleep-pass-orchestrator
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sleep-pass-orchestrator
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sleep-pass-orchestrator-allow-dns-egress
  labels:
    app.kubernetes.io/name: sleep-pass-orchestrator
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sleep-pass-orchestrator
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sleep-pass-orchestrator-allow-ingress
  labels:
    app.kubernetes.io/name: sleep-pass-orchestrator
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sleep-pass-orchestrator
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 3040
    # Prometheus scrape — /metrics on the app port (3040)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3040
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sleep-pass-orchestrator-allow-egress
  labels:
    app.kubernetes.io/name: sleep-pass-orchestrator
    app.kubernetes.io/part-of: borjie
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sleep-pass-orchestrator
  policyTypes: [Egress]
  egress:
    # Postgres — sleep passes (audit-chain verify, data-quality scan,
    # expired-token cleanup, metrics rollup, dormant-tenant detector).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis — DLQ replay + cache warm-up passes.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Observability
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
