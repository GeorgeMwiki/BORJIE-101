# Prometheus Operator ServiceMonitor — scrape /metrics on the app port.
# The sleep-pass-orchestrator service exposes /metrics on the same
# listener as the app (no separate metrics port).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sleep-pass-orchestrator
  labels:
    app.kubernetes.io/name: sleep-pass-orchestrator
    app.kubernetes.io/part-of: borjie
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sleep-pass-orchestrator
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - borjie-app
      - borjie-staging
      - borjie-prod
