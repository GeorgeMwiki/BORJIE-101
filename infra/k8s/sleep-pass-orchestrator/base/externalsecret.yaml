# =============================================================================
# sleep-pass-orchestrator — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/sleep-pass-orchestrator`:
#   - DATABASE_URL                 postgres connection string
#   - REDIS_URL                    DLQ + cache passes
#   - HEARTBEAT_INTERVAL_MS        optional override (default 60000)
#   - SENTRY_DSN
#   - OTEL_EXPORTER_OTLP_ENDPOINT
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sleep-pass-orchestrator-secrets
  labels:
    app.kubernetes.io/name: sleep-pass-orchestrator
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: sleep-pass-orchestrator-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/sleep-pass-orchestrator
