# =============================================================================
# consolidation-worker base — Deployment + NetworkPolicy + ExternalSecret
# =============================================================================
# A singleton long-running worker:
#   - no HTTP surface     → no Service / Ingress / ServiceMonitor
#   - single replica      → no HPA / PDB (the deployment already
#                            guarantees ≤1 pod via strategy: Recreate)
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-app

commonLabels:
  app.kubernetes.io/part-of: borjie
  app.kubernetes.io/managed-by: kustomize

resources:
  - deployment.yaml
  - networkpolicy.yaml
  - externalsecret.yaml

images:
  - name: ghcr.io/georgemwiki/borjie-consolidation-worker
    newTag: latest
