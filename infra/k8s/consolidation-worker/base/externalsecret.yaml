# =============================================================================
# consolidation-worker — ExternalSecret (External Secrets Operator)
# =============================================================================
# Expected remote keys at `borjie/<env>/consolidation-worker`:
#   - DATABASE_URL                    postgres connection string
#   - CONSOLIDATION_INTERVAL_MS       optional override (default 3600000)
#   - OTEL_EXPORTER_OTLP_ENDPOINT
#   - SENTRY_DSN
# When the Haiku consolidator is wired add:
#   - ANTHROPIC_API_KEY
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: consolidation-worker-secrets
  labels:
    app.kubernetes.io/name: consolidation-worker
    app.kubernetes.io/part-of: borjie
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-aws
    kind: ClusterSecretStore
  target:
    name: consolidation-worker-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: borjie/prod/consolidation-worker
