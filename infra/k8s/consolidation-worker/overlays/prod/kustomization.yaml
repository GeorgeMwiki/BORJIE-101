apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: borjie-prod

resources:
  - ../../base

images:
  - name: ghcr.io/georgemwiki/borjie-consolidation-worker
    newTag: ${IMAGE_TAG}

patches:
  - target:
      kind: Deployment
      name: consolidation-worker
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "300m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
