# =============================================================================
# Redis primary config — HA topology
# =============================================================================
# Identical replication shape to the existing single-instance redis service,
# plus replication-aware tuning so Sentinel can promote any replica cleanly.
#
# Passwords are injected via the container command line (--requirepass /
# --masterauth) rather than baked here, so secrets stay in .env.production.
# =============================================================================

port 6379
bind 0.0.0.0
protected-mode yes

# Persistence — match production single-instance
appendonly yes
appendfsync everysec
save 60 1000

# Memory cap (override via --maxmemory at runtime if needed)
maxmemory 512mb
maxmemory-policy allkeys-lru

# Replication safety — replicas should not serve stale data during failover
min-replicas-to-write 1
min-replicas-max-lag 10
replica-serve-stale-data no
replica-read-only yes

# Logging
loglevel notice
logfile ""

# Use replica-announce-ip in docker network so Sentinel discovery works without
# manual IPs. Each node passes --replica-announce-ip via entrypoint.
