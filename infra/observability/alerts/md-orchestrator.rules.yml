# Prometheus alerting rules for the MD orchestrator (Phase F.7).
#
# Validate with: promtool check rules infra/observability/alerts/md-orchestrator.rules.yml
#
# Each alert has a sibling runbook at docs/runbooks/<alert-name>.md.

groups:
  - name: md-orchestrator
    interval: 30s
    rules:
      - alert: KernelErrorRateHigh
        expr: rate(kernel_errors_total[5m]) > 0.01
        for: 10m
        labels:
          severity: critical
          team: central-command
        annotations:
          summary: "Kernel error rate above 1% for 10 minutes"
          description: |
            Current 5m error rate is {{ $value | humanize }} errors/s
            (threshold: 0.01 errors/s). Tail-sample traces in the
            md-orchestrator-overview dashboard and check the sub-MD with
            highest error contribution.
          runbook_url: docs/runbooks/kernel-error-rate-high.md

      - alert: KernelLatencyP99High
        expr: histogram_quantile(0.99, sum(rate(kernel_request_duration_ms_bucket[5m])) by (le)) > 2000
        for: 15m
        labels:
          severity: warning
          team: central-command
        annotations:
          summary: "Kernel p99 latency > 2s for 15 minutes"
          description: |
            p99 is currently {{ $value | humanize }}ms (threshold: 2000ms).
            Likely causes: hook-chain bottleneck, slow LLM provider, DB
            connection-pool exhaustion.
          runbook_url: docs/runbooks/kernel-latency-p99-high.md

      - alert: SubMdSloBreach
        expr: sub_md_slo_status{status="breach"} > 0
        for: 5m
        labels:
          severity: critical
          team: central-command
        annotations:
          summary: "Sub-MD {{ $labels.sub_md }} is in SLO breach"
          description: |
            Sub-MD `{{ $labels.sub_md }}` (canary stage:
            {{ $labels.canary_stage }}) has been in SLO breach for 5
            minutes. Either roll back the canary or relax the SLO
            target with explicit approval.
          runbook_url: docs/runbooks/sub-md-slo-breach.md

  - name: tenant-autonomy
    interval: 1m
    rules:
      - alert: AutonomyCapNearLimit
        expr: tenant_autonomy_cap_usage / tenant_autonomy_cap_ceiling > 0.9
        for: 15m
        labels:
          severity: warning
          team: central-command
        annotations:
          summary: "Tenant {{ $labels.tenant_id }} at >90% autonomy cap"
          description: |
            Tenant `{{ $labels.tenant_id }}` cap usage is
            {{ $value | humanizePercentage }} of ceiling. Either bump
            the ceiling (after review) or surface a usage warning to
            the tenant.
          runbook_url: docs/runbooks/autonomy-cap-near-limit.md

      - alert: AutonomyCapBreached
        expr: tenant_autonomy_cap_usage / tenant_autonomy_cap_ceiling > 1.0
        for: 1m
        labels:
          severity: critical
          team: central-command
        annotations:
          summary: "Tenant {{ $labels.tenant_id }} BREACHED autonomy ceiling"
          description: |
            Tenant exceeded the autonomy cap. The kernel should already
            have shed traffic — investigate why pre-breach throttling
            failed.
          runbook_url: docs/runbooks/autonomy-cap-breached.md

  - name: cost-attribution
    interval: 1m
    rules:
      - alert: AiCostPerTenantSpike
        expr: rate(ai_cost_usd_per_tenant[1h]) > 5.0
        for: 30m
        labels:
          severity: warning
          team: finops
        annotations:
          summary: "Tenant {{ $labels.tenant_id }} AI spend >$5/h"
          description: |
            Tenant `{{ $labels.tenant_id }}` (tier:
            {{ $labels.tier }}) has burned {{ $value | humanize }}
            USD/h on AI calls for 30 minutes. Threshold based on tier
            unit-economics — investigate prompt loops or unexpected
            heavy workflows.
          runbook_url: docs/runbooks/ai-cost-per-tenant-spike.md

      - alert: AiCostGlobalBudgetBurnRate
        expr: |
          (
            sum(rate(ai_cost_usd_per_tenant[1h])) * 24 * 30
          ) > 50000
        for: 1h
        labels:
          severity: warning
          team: finops
        annotations:
          summary: "Global AI spend on track for >$50k/month"
          description: |
            Projected monthly burn at current 1h rate is
            ${{ $value | humanize }}.
          runbook_url: docs/runbooks/ai-cost-global-budget.md

  - name: forecasting
    interval: 5m
    rules:
      - alert: ForecastingAccuracyDegrade
        expr: avg_over_time(forecasting_accuracy_score[1h]) < 0.7
        for: 30m
        labels:
          severity: warning
          team: ml-platform
        annotations:
          summary: "Forecasting accuracy below 0.7 for 30 minutes"
          description: |
            Average forecast accuracy over the past hour is
            {{ $value | humanizePercentage }} (threshold: 0.7). Indicates
            model drift — schedule a retrain.
          runbook_url: docs/runbooks/forecasting-accuracy-degrade.md

  - name: observability-self-health
    interval: 1m
    rules:
      - alert: OtelExporterInitErrors
        expr: increase(otel_exporter_init_errors_total[10m]) > 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "OTel exporter has init errors in the last 10 minutes"
          description: |
            Observability self-health: span exporter failed to
            initialise — traces will be dropped. Check
            OTEL_EXPORTER_OTLP_* env vars.
          runbook_url: docs/runbooks/otel-exporter-init-errors.md

  - name: compliance-breach-indicator
    interval: 30s
    rules:
      - alert: BreachIndicator
        expr: |
          (
            increase(audit_unauthorized_access_total[5m]) > 5
          ) or (
            increase(pii_egress_blocked_total[5m]) > 10
          )
        for: 2m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "Potential personal-data breach indicator firing"
          description: |
            Either >5 unauthorised audit events or >10 PII egress
            blocks have fired in a 5-minute window. Begin 72-hour
            breach-notification clock as a precaution — see
            docs/compliance/breach-notification-runbook.md.
          runbook_url: docs/runbooks/breach-indicator.md
