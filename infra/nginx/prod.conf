# =============================================================================
# BORJIE — Nginx reverse proxy (Phase F.6 docker-compose.production.yml)
# =============================================================================
# TLS termination + HTTPS-only routing for the self-hosted production stack.
# Certbot writes to /etc/letsencrypt; the `certbot-webroot` volume mounts the
# ACME http-01 challenge dir at /var/www/certbot.
#
# Domain layout (override via CERTBOT_DOMAINS):
#   borjie.com           -> marketing
#   api.borjie.com       -> api-gateway:4000
#   www.borjie.com       -> customer-app:3000
#   admin.borjie.com     -> admin-platform-portal:80
#   owners.borjie.com    -> owner-portal:80
#   manage.borjie.com    -> estate-manager-app:3000
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout  65;
    server_tokens off;

    # ---- TLS posture --------------------------------------------------------
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ---- Logging ------------------------------------------------------------
    log_format json escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
        '"method":"$request_method","uri":"$request_uri","status":$status,'
        '"bytes_sent":$bytes_sent,"req_time":$request_time,'
        '"upstream_time":"$upstream_response_time","ua":"$http_user_agent",'
        '"referer":"$http_referer"}';
    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    # ---- Security headers (applied via map below + add_header in servers) --
    map $sent_http_content_type $cache_control {
        default                                 "no-cache, no-store, must-revalidate";
        ~^image/                                "public, max-age=31536000, immutable";
        ~^font/                                 "public, max-age=31536000, immutable";
        ~^application/javascript                "public, max-age=31536000, immutable";
        ~^text/css                              "public, max-age=31536000, immutable";
    }

    # ---- Rate limiting ------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ---- Upstreams ----------------------------------------------------------
    upstream api_gateway        { server api-gateway:4000;        keepalive 32; }
    upstream marketing_app      { server marketing:3000;          keepalive 32; }
    upstream customer_app       { server customer-app:3000;       keepalive 32; }
    upstream owner_portal       { server owner-portal:80;         keepalive 16; }
    upstream admin_portal       { server admin-platform-portal:80; keepalive 16; }
    upstream estate_manager     { server estate-manager-app:3000; keepalive 32; }

    # =========================================================================
    # HTTP -> HTTPS redirect + ACME challenge passthrough
    # =========================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # api.borjie.com -> api-gateway
    # =========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.borjie.com;

        ssl_certificate     /etc/letsencrypt/live/api.borjie.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.borjie.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        client_max_body_size 25m;
        limit_conn conn 64;

        location /api/v1/auth/ {
            limit_req zone=auth_rl burst=10 nodelay;
            proxy_pass http://api_gateway;
            include /etc/nginx/proxy_params_inline;
        }

        location / {
            limit_req zone=api_rl burst=40 nodelay;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }

    # =========================================================================
    # borjie.com -> marketing
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name borjie.com;

        ssl_certificate     /etc/letsencrypt/live/borjie.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/borjie.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location / {
            proxy_pass http://marketing_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # =========================================================================
    # www.borjie.com -> customer-app
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name www.borjie.com;

        ssl_certificate     /etc/letsencrypt/live/www.borjie.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.borjie.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location / {
            proxy_pass http://customer_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # =========================================================================
    # admin.borjie.com -> admin-platform-portal
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name admin.borjie.com;

        ssl_certificate     /etc/letsencrypt/live/admin.borjie.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.borjie.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;

        location / {
            proxy_pass http://admin_portal;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # =========================================================================
    # owners.borjie.com -> owner-portal
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name owners.borjie.com;

        ssl_certificate     /etc/letsencrypt/live/owners.borjie.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/owners.borjie.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location / {
            proxy_pass http://owner_portal;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # =========================================================================
    # manage.borjie.com -> estate-manager-app
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name manage.borjie.com;

        ssl_certificate     /etc/letsencrypt/live/manage.borjie.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/manage.borjie.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location / {
            proxy_pass http://estate_manager;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
