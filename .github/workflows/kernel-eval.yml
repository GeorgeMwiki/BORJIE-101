# =============================================================================
# central-intelligence kernel — regression eval harness
# =============================================================================
# Runs the deterministic scenario corpus through `composeSovereign()` on
# every PR. The harness uses a stub sensor (no Anthropic / no network)
# so this workflow is fast and free.
# =============================================================================

name: Kernel Eval

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  kernel-eval:
    name: Kernel Eval (deterministic stub)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run kernel eval suite
        run: |
          pnpm -C packages/central-intelligence test \
            --reporter=verbose \
            -- src/__tests__/eval/eval.test.ts
