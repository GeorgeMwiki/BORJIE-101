# TODO(borjie): audit/prune; see .github/workflows/borjie-ci.yml for the current source of truth
# =============================================================================
# Software Bill of Materials (SBOM)
# =============================================================================
# Generates a CycloneDX SBOM for the monorepo on every push to main / develop
# and on every release. The SBOM lists every direct and transitive dependency
# with version + license + PURL, suitable for:
#   - regulator / procurement requests ("send us an SBOM"),
#   - vulnerability cross-reference (`grype sbom:borjie.cyclonedx.json`),
#   - long-term forensic replay (attached to releases for 90 days).
#
# Source pattern: LITFIN's `security.yml` SBOM job (Anchore syft).
# Closure direction: BORJIE was missing this artefact entirely.
# =============================================================================

name: SBOM

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate CycloneDX SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: borjie.cyclonedx.json
          # Include dev dependencies so the SBOM mirrors what the CI
          # actually installs; procurement reviewers can filter on
          # `scope: optional` if they want runtime-only.
          dependency-snapshot: false

      - name: Generate CycloneDX SBOM (SPDX mirror, for tooling parity)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: borjie.spdx.json
          dependency-snapshot: false

      - name: Validate SBOM shape (non-empty, has components)
        run: |
          set -euo pipefail
          test -s borjie.cyclonedx.json
          COMPONENT_COUNT=$(jq '.components | length' borjie.cyclonedx.json)
          if [ "${COMPONENT_COUNT}" -lt 50 ]; then
            echo "::error::SBOM has only ${COMPONENT_COUNT} components (expected >50)"
            exit 1
          fi
          echo "## SBOM Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Components: ${COMPONENT_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Format: CycloneDX JSON + SPDX JSON" >> "$GITHUB_STEP_SUMMARY"
          echo "- Spec version: $(jq -r '.specVersion' borjie.cyclonedx.json)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SBOM artifact (90-day retention)
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.sha }}
          path: |
            borjie.cyclonedx.json
            borjie.spdx.json
          retention-days: 90

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            borjie.cyclonedx.json
            borjie.spdx.json
