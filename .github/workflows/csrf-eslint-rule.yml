# TODO(borjie): audit/prune; see .github/workflows/borjie-ci.yml for the current source of truth
# =============================================================================
# CSRF eslint rule — F1 Wave-13 LITFIN port primitive
# =============================================================================
# Runs the local `require-csrf-headers` eslint rule against every PR
# that touches a Next.js app or the rule itself. Guards the F1 LITFIN
# port (CSRF eslint rule) so a regression that strips a CSRF header
# from a mutation client / hook is caught at PR time.
#
# The rule lives at `eslint-rules/require-csrf-headers.cjs`. Each
# customer-facing app already imports it in its eslint config; this
# workflow runs the rule-author test (`__tests__/...`) plus a full
# pnpm lint pass scoped to apps so the rule actually fires.
# =============================================================================

name: CSRF Eslint Rule

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'eslint-rules/**'
      - 'apps/**/src/**/*.ts'
      - 'apps/**/src/**/*.tsx'
      - '.github/workflows/csrf-eslint-rule.yml'
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: csrf-eslint-rule-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: require-csrf-headers rule check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run rule-author tests
        run: node --test eslint-rules/__tests__/require-csrf-headers.test.cjs

      - name: Lint apps for CSRF header compliance
        run: |
          for app in apps/customer-app apps/owner-portal apps/admin-web apps/estate-manager-app; do
            if [ -d "$app" ]; then
              echo "Linting $app"
              pnpm -C "$app" lint || exit 1
            fi
          done
