# Borjie OpenAPI drift audit
# Source of truth for CI orchestration: .github/workflows/borjie-ci.yml
#
# Regenerates the canonical OpenAPI spec and fails if the working tree shows
# uncommitted changes (i.e. the source code drifted from the committed spec).
# Closes PARITY_AUDIT_2026_05_26 section 14a.
name: Borjie OpenAPI drift

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: borjie-openapi-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openapi-drift:
    name: OpenAPI drift audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        continue-on-error: true

      - name: Run OpenAPI drift audit
        id: audit
        run: node scripts/audit-openapi-drift.mjs | tee openapi-drift.log

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: borjie-openapi-drift-log
          path: openapi-drift.log
          if-no-files-found: warn
