# TODO(borjie): audit/prune; see .github/workflows/borjie-ci.yml for the current source of truth
# =============================================================================
# BORJIE CI Pipeline
# =============================================================================
# Runs on: PRs to main/develop, pushes to main/develop
# Quality gates: lint, typecheck, test, build, e2e
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Quality Gate 1: Lint (ESLint + Prettier)
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  # ============================================
  # Quality Gate 2: Type Check
  # ============================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build internal packages first so package-barrel `dist/` exports
      # exist (some apps/packages import via the `import` condition,
      # which requires `dist/` per package.json `exports`).
      - name: Build internal packages
        run: pnpm -r --filter='./packages/*' --filter='./services/*' build || true

      - name: Run TypeScript type check
        run: pnpm typecheck

  # ============================================
  # Quality Gate 3: Unit Tests (parallel matrix)
  # ============================================
  test:
    name: Unit Tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - packages
          - services
          - apps
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build internal packages first so package-barrel `dist/` exports
      # exist (vitest resolves package imports via the `import`
      # condition, which requires `dist/`).
      - name: Build internal packages
        run: pnpm -r --filter='./packages/*' --filter='./services/*' build || true

      - name: Run unit tests (${{ matrix.workspace }})
        run: pnpm -r --filter="./${{ matrix.workspace }}/*" test

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.workspace }}
          path: ${{ matrix.workspace }}/*/coverage
          retention-days: 7
          if-no-files-found: ignore

  # ============================================
  # Brain Eval — ALL_SCENARIOS against the mock Brain
  # ============================================
  brain-eval:
    name: Brain Eval
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '8.15.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Brain eval
        run: pnpm eval

  # ============================================
  # Quality Gate 4: Build All Packages
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            apps/*/dist
            apps/*/.next
            services/*/dist
          retention-days: 7

  # ============================================
  # Quality Gate 5: E2E Tests (Playwright, real backend)
  # ============================================
  # The wave-K audit found that page.route() mocks at the customer-app level
  # were hiding real bugs (FeedbackThumbs 👍/👎 schema mismatch shipped
  # undetected). The E2E job now boots the REAL api-gateway + customer-app +
  # postgres via docker-compose.e2e.yml, seeds known fixtures, and runs
  # Playwright against the real stack — no internal mocks.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start E2E stack (postgres + api-gateway + all 4 portal apps)
        # docker-compose.e2e.yml now boots customer-app + admin-web
        # + owner-portal + estate-manager-app alongside api-gateway, so every
        # Playwright project below has its real backend & frontend ready. One
        # `up --wait` (with healthchecks) blocks until the stack is green.
        run: docker compose -f docker-compose.e2e.yml up -d --wait

      - name: Seed test data
        run: pnpm tsx e2e/fixtures/seed-runner.ts
        env:
          DATABASE_URL: postgresql://borjie:borjie_e2e@localhost:55432/borjie_e2e

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E (all portal projects, real backend, parallel)
        # No `--project` filter — Playwright's per-project `testMatch` keeps
        # specs scoped to their portal, and its built-in worker pool runs
        # projects in parallel within this one job. A matrix would re-build
        # the docker stack 4x; keeping it in one job is the least diff.
        run: pnpm test:e2e
        env:
          CUSTOMER_APP_URL: http://localhost:3002
          ADMIN_PORTAL_URL: http://localhost:3001
          OWNER_PORTAL_URL: http://localhost:3000
          ESTATE_MANAGER_URL: http://localhost:3003
          API_GATEWAY_URL: http://localhost:4000
          # Do NOT set E2E_USE_STUB — default real-backend mode is the whole point.

      - name: Capture stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs > e2e-stack-logs.txt

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts
          path: |
            playwright-report/
            e2e-report/
            e2e-stack-logs.txt
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  # ============================================
  # Docker Build Check (validate Dockerfiles)
  # ============================================
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: docker/Dockerfile.api
            context: .
            image: api-gateway
          - dockerfile: docker/Dockerfile.web
            context: .
            image: web-apps
            build-args: |
              APP_NAME=customer-app
              APP_PATH=apps/customer-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: borjie/${{ matrix.image }}:pr-${{ github.event.pull_request.number }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Security Scan (Trivy)
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ============================================
  # Summary
  # ============================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, e2e]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "TypeCheck: ${{ needs.typecheck.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "E2E: ${{ needs.e2e.result }}"
          echo "All CI jobs completed"

      - name: Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
