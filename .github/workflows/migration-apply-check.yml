# =============================================================================
# Migration Apply Check — every migration must apply cleanly on a fresh DB
# =============================================================================
# Spins up an ephemeral Postgres 17 service container, then applies every
# *.sql file in `packages/database/src/migrations/` in lexical order
# against it. A single failed apply fails the job — earlier migrations
# break later ones, so the whole chain is the unit of correctness.
# =============================================================================

name: Migration Apply Check

on:
  pull_request:
    paths:
      - 'packages/database/src/migrations/**'
      - 'packages/database/src/schemas/**'
      - 'scripts/migration-apply-check.mjs'
      - 'scripts/validate-migration-safety.mjs'
      - '.github/workflows/migration-apply-check.yml'
  push:
    branches: [main]
    paths:
      - 'packages/database/src/migrations/**'
      - 'packages/database/src/schemas/**'
  workflow_dispatch:

concurrency:
  group: migration-apply-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-all-migrations:
    name: Apply every migration in order against Postgres 17
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: borjie
          POSTGRES_PASSWORD: borjie
          POSTGRES_DB: borjie_migration_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U borjie"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
    env:
      DATABASE_URL: postgres://borjie:borjie@localhost:5432/borjie_migration_check
      MIGRATIONS_DIR: packages/database/src/migrations
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Wait for Postgres to be ready
        run: |
          set -e
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U borjie >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Postgres did not become ready within 30s"
          exit 1

      - name: Try CREATE EXTENSION vector (best-effort)
        run: |
          PGPASSWORD=borjie psql -h localhost -U borjie -d borjie_migration_check \
            -c "CREATE EXTENSION IF NOT EXISTS vector" 2>&1 | tail -3 || \
            echo "::warning::pgvector not available — migrations that depend on it may fail"

      - name: Seed Supabase roles (authenticated, anon, service_role)
        env:
          PGPASSWORD: borjie
        run: |
          psql -h localhost -p 5432 -U borjie -d borjie_migration_check <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role NOLOGIN BYPASSRLS;
            END IF;
          END
          $$;
          SQL

      - name: Apply all migrations against fresh Postgres
        run: |
          node scripts/migration-apply-check.mjs \
            --migrations-dir="${MIGRATIONS_DIR}" \
            --db-url="${DATABASE_URL}" \
            --report=.audit/migration-apply.md

      - name: Smoke query — verify public schema landed
        run: |
          set -e
          ROWS=$(PGPASSWORD=borjie psql -h localhost -U borjie -d borjie_migration_check -tA \
            -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' LIMIT 5")
          if [ -z "$ROWS" ]; then
            echo "::error::Smoke query returned zero rows — public schema did not materialize"
            exit 1
          fi
          echo "Sample tables in public schema:"
          echo "$ROWS"

      - name: Upload migration-apply report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-apply-report
          path: .audit/migration-apply.md
          if-no-files-found: warn

  validate-migration-safety:
    name: Lint dangerous patterns in new migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Run migration safety lint
        env:
          SINCE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.event.pull_request.base.ref) || 'HEAD~1' }}
        run: |
          node scripts/validate-migration-safety.mjs \
            --migrations-dir=packages/database/src/migrations \
            --since-ref="${SINCE_REF}" \
            --fail-on=fail \
            --output=markdown \
            --report=.audit/migration-safety.md
      - name: Upload safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-safety-report
          path: .audit/migration-safety.md
          if-no-files-found: warn
