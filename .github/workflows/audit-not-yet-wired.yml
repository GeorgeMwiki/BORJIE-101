name: Audit NOT_YET_WIRED

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# CI gate enforcing no-NOT_YET_WIRED in production paths.
# Threshold tunable via the NOT_YET_WIRED_THRESHOLD repo variable.

permissions:
  contents: read

jobs:
  audit:
    name: audit-not-yet-wired
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run audit
        env:
          NOT_YET_WIRED_THRESHOLD: ${{ vars.NOT_YET_WIRED_THRESHOLD || '0' }}
        run: node scripts/audit-not-yet-wired.mjs

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: not-yet-wired-report
          path: .audit/not-yet-wired-targets.md
          if-no-files-found: warn
