# =============================================================================
# Borjie DB Migrations Check
# =============================================================================
# Builds the project's bespoke Postgres image (pgvector + PostGIS, see
# docker/postgres/Dockerfile) and runs the Borjie mining migrations against
# a fresh database.
#
# The legacy `db-migrations-check.yml` workflow remains in-tree but targets
# the property-domain migrations; this workflow is the source of truth for
# the Borjie mining stack and exercises the same applier used in local
# development (`scripts/apply-borjie-mining-migration.mjs`).
# =============================================================================

name: Borjie DB Migrations Check

on:
  push:
    branches: [main]
    paths:
      - "packages/database/drizzle/**"
      - "scripts/apply-borjie-mining-migration.mjs"
      - "docker/postgres/Dockerfile"
      - ".github/workflows/borjie-db-migrations-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/database/drizzle/**"
      - "scripts/apply-borjie-mining-migration.mjs"
      - "docker/postgres/Dockerfile"
      - ".github/workflows/borjie-db-migrations-check.yml"
  workflow_dispatch:

concurrency:
  group: borjie-db-migrations-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  apply-borjie-mining-migrations:
    name: Apply Borjie mining migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POSTGRES_USER: borjie
      POSTGRES_PASSWORD: borjie
      POSTGRES_DB: borjie_mining_ci
      DATABASE_URL: postgres://borjie:borjie@127.0.0.1:5432/borjie_mining_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm 8
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Build Borjie postgres image
        run: |
          docker build \
            -f docker/postgres/Dockerfile \
            -t borjie-postgres:ci \
            docker/postgres

      - name: Start Borjie postgres container
        run: |
          docker run -d \
            --name borjie-postgres-ci \
            -e POSTGRES_USER=${POSTGRES_USER} \
            -e POSTGRES_PASSWORD=${POSTGRES_PASSWORD} \
            -e POSTGRES_DB=${POSTGRES_DB} \
            -p 5432:5432 \
            --health-cmd "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 20 \
            borjie-postgres:ci

      - name: Wait for postgres readiness
        run: |
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' borjie-postgres-ci 2>/dev/null || echo "starting")
            if [ "${STATUS}" = "healthy" ]; then
              echo "Postgres is healthy."
              exit 0
            fi
            echo "[${i}/60] postgres status=${STATUS}; waiting..."
            sleep 2
          done
          echo "::error::Postgres did not become healthy within 120s."
          docker logs borjie-postgres-ci || true
          exit 1

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Apply Borjie mining migrations
        run: node scripts/apply-borjie-mining-migration.mjs

      - name: Dump migration registry on failure
        if: failure()
        run: |
          docker exec -u postgres borjie-postgres-ci \
            psql -d ${POSTGRES_DB} -c "SELECT hash, created_at FROM drizzle.__drizzle_migrations ORDER BY id;" || true
          docker logs borjie-postgres-ci || true

      - name: Stop postgres container
        if: always()
        run: |
          docker rm -f borjie-postgres-ci || true
