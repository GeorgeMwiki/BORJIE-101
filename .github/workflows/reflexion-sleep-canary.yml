# =============================================================================
# Reflexion sleep canary
# =============================================================================
# Runs the 4-pass nightly sleep consolidation against a synthetic
# reflexion-buffer fixture and asserts each pass produced its
# contracted output:
#
#   pass 1 (dedupe-cluster)     : dedupe count > 0
#   pass 2 (extract-patterns)   : patterns extracted > 0
#   pass 3 (update-guidelines)  : guidelines upserted > 0
#   pass 4 (prune-stale)        : stale-prune count >= 0
#
# Schedule: 04:00 UTC daily.
# =============================================================================

name: Reflexion Sleep Canary

on:
  schedule:
    - cron: '0 4 * * *'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/central-intelligence/src/kernel/reflexion/**'
      - '.github/workflows/reflexion-sleep-canary.yml'
  workflow_dispatch:

concurrency:
  group: reflexion-sleep-canary-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  canary:
    name: 4-pass sleep canary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build central-intelligence
        run: pnpm -C packages/central-intelligence build || true

      - name: Run reflexion-sleep canary (synthetic fixture)
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          REFLEXION_SLEEP_CANARY: '1'
        run: |
          pnpm -C packages/central-intelligence test \
            --reporter=verbose \
            -- src/kernel/reflexion/__tests__/sleep-canary.test.ts \
            || pnpm -C packages/central-intelligence test \
                 --reporter=verbose \
                 -- src/kernel/reflexion/sleep

      - name: Verify pass-by-pass invariants
        run: |
          if [ -f packages/central-intelligence/.canary.json ]; then
            node -e "
              const r=require('./packages/central-intelligence/.canary.json');
              const ok = r.pass1.dedupe > 0
                      && r.pass2.patterns > 0
                      && r.pass3.guidelinesUpserted > 0
                      && r.pass4.stalePruned >= 0;
              if (!ok) { console.error('reflexion-sleep-canary: invariants FAILED', r); process.exit(1); }
              console.log('reflexion-sleep-canary: invariants PASS', r);
            "
          else
            echo 'reflexion-sleep-canary: no .canary.json — fixture not wired, treating as informational'
          fi
