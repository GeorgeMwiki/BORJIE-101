# =============================================================================
# Backup Restore Test
# =============================================================================
# Weekly drill that proves the production backups produced by
# scripts/backup.sh are actually restorable.
# =============================================================================

name: Backup Restore Test

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      s3_uri:
        description: 'Override: full s3:// URI to a specific encrypted dump (otherwise auto-pick latest daily)'
        required: false
        default: ''
      min_rows_tenants:
        description: 'Minimum required rows in tenants'
        required: false
        default: '1'
      min_rows_users:
        description: 'Minimum required rows in users'
        required: false
        default: '1'
      min_rows_properties:
        description: 'Minimum required rows in properties'
        required: false
        default: '1'

concurrency:
  group: backup-restore-test
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  guard:
    name: Preflight — skip if secrets absent
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [[ "${{ vars.HAS_BACKUP_RESTORE_SECRETS }}" == "true" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Test enabled: vars.HAS_BACKUP_RESTORE_SECRETS=${{ vars.HAS_BACKUP_RESTORE_SECRETS }}, event=${{ github.event_name }}"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping test: vars.HAS_BACKUP_RESTORE_SECRETS not set; see .github/CI_SOFT_FAILURES.md"
          fi

  restore-drill:
    name: Restore from S3 and smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: guard
    if: needs.guard.outputs.should_run == 'true'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: borjie
          POSTGRES_PASSWORD: borjie
          POSTGRES_DB: borjie_restore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U borjie"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      RESTORE_DB_URL: postgres://borjie:borjie@localhost:5432/borjie_restore
      BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
      BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
      BACKUP_PREFIX: ${{ vars.BACKUP_PREFIX || 'borjie' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
      AWS_ENDPOINT_URL_S3: ${{ vars.AWS_ENDPOINT_URL_S3 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Postgres client (16) and openssl
        run: |
          set -e
          sudo apt-get update -qq
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-16 openssl gzip
          pg_restore --version
          psql --version
          openssl version

      - name: Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_RESTORE_TEST_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RESTORE_TEST_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (static fallback)
        if: ${{ secrets.AWS_RESTORE_TEST_ROLE_ARN == '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "${AWS_ACCESS_KEY_ID}" ] || [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::No AWS credentials configured. Set either AWS_RESTORE_TEST_ROLE_ARN (OIDC) or AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY secrets."
            exit 1
          fi
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> "$GITHUB_ENV"

      - name: Wait for ephemeral Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U borjie && exit 0
            sleep 1
          done
          echo "::error::Postgres service never became ready"
          exit 1

      - name: Validate required secrets
        run: |
          set -e
          MISSING=()
          [ -z "${BACKUP_ENCRYPTION_KEY:-}" ] && MISSING+=("BACKUP_ENCRYPTION_KEY")
          [ -z "${BACKUP_BUCKET:-}" ] && MISSING+=("BACKUP_BUCKET")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi

      - name: Download and decrypt latest backup
        id: download
        env:
          OVERRIDE_S3_URI: ${{ github.event.inputs.s3_uri }}
        run: |
          set -e
          chmod +x scripts/restore-backup.sh
          OUTPUT_PATH="${RUNNER_TEMP}/restored.dump"
          if [ -n "${OVERRIDE_S3_URI}" ]; then
            echo "Using override URI: ${OVERRIDE_S3_URI}"
            scripts/restore-backup.sh \
              --s3-uri "${OVERRIDE_S3_URI}" \
              --output "${OUTPUT_PATH}"
            echo "source=${OVERRIDE_S3_URI}" >> "$GITHUB_OUTPUT"
          else
            scripts/restore-backup.sh \
              --latest \
              --bucket "${BACKUP_BUCKET}" \
              --prefix "${BACKUP_PREFIX}" \
              --output "${OUTPUT_PATH}"
            echo "source=latest-daily" >> "$GITHUB_OUTPUT"
          fi
          echo "dump_path=${OUTPUT_PATH}" >> "$GITHUB_OUTPUT"
          ls -lh "${OUTPUT_PATH}"

      - name: Restore into ephemeral Postgres
        id: restore
        run: |
          set -e
          DUMP="${{ steps.download.outputs.dump_path }}"
          START=$(date +%s)
          pg_restore \
            --clean --if-exists \
            --no-owner --no-privileges \
            --dbname "${RESTORE_DB_URL}" \
            --verbose \
            "${DUMP}" 2> "${RUNNER_TEMP}/pg_restore.log" || RC=$?
          END=$(date +%s)
          DURATION=$((END - START))
          echo "duration_seconds=${DURATION}" >> "$GITHUB_OUTPUT"
          RC=${RC:-0}
          tail -n 40 "${RUNNER_TEMP}/pg_restore.log" || true
          if [ "${RC}" -ge 2 ]; then
            echo "::error::pg_restore failed with rc=${RC}"
            exit "${RC}"
          fi
          if [ "${RC}" -eq 1 ]; then
            echo "::warning::pg_restore exited with rc=1 (non-fatal warnings present — see logs)"
          fi
          echo "restore_rc=${RC}" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests against restored DB
        id: smoke
        env:
          MIN_TENANTS: ${{ github.event.inputs.min_rows_tenants || '1' }}
          MIN_USERS: ${{ github.event.inputs.min_rows_users || '1' }}
          MIN_PROPERTIES: ${{ github.event.inputs.min_rows_properties || '1' }}
        run: |
          set -e
          chmod +x scripts/restore-smoke-test.sh
          SUMMARY_PATH="${RUNNER_TEMP}/smoke-summary.md"
          scripts/restore-smoke-test.sh \
            --db-url "${RESTORE_DB_URL}" \
            --min-rows-tenants "${MIN_TENANTS}" \
            --min-rows-users "${MIN_USERS}" \
            --min-rows-properties "${MIN_PROPERTIES}" \
            --summary-file "${SUMMARY_PATH}"
          echo "summary_path=${SUMMARY_PATH}" >> "$GITHUB_OUTPUT"

      - name: Append summary to job
        if: always()
        run: |
          SUMMARY="${{ steps.smoke.outputs.summary_path }}"
          {
            echo "# Backup Restore Drill"
            echo
            echo "- Source: ${{ steps.download.outputs.source }}"
            echo "- Restore duration: ${{ steps.restore.outputs.duration_seconds }}s"
            echo "- pg_restore rc: ${{ steps.restore.outputs.restore_rc }}"
            echo
            if [ -f "${SUMMARY}" ]; then
              cat "${SUMMARY}"
            else
              echo "_(smoke-summary file missing — likely the download or restore step failed)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pg_restore log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pg_restore-log-${{ github.run_id }}
          path: ${{ runner.temp }}/pg_restore.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Notify Slack on failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -n \
              --arg text "BORJIE backup restore drill FAILED — run ${{ github.run_id }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{text: $text, blocks: [
                {type: "section", text: {type: "mrkdwn", text: ($text + "\n<\($url)|View run logs>")}}
              ]}')" \
            "${SLACK_WEBHOOK_URL}" || true

      - name: Open / update tracking issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Backup restore drill FAILED';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The weekly backup restore drill failed on run [${context.runId}](${runUrl}).`,
              '',
              'This is a **SEV-2** signal: the production backups produced by `scripts/backup.sh` could not be restored into a clean Postgres instance.',
              '',
              '### Investigate',
              '- Pull the `pg_restore.log` artifact from the failed run.',
              '- Check the latest object under `s3://${BACKUP_BUCKET:-???}/${BACKUP_PREFIX:-borjie}/daily/` — is it the expected size?',
              '- Verify the `BACKUP_ENCRYPTION_KEY` secret still matches the key the backup cron is using.',
              '- Re-run manually with `workflow_dispatch` to retry.',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'backup-restore-drill',
              per_page: 5,
            });

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
              core.info(`Commented on existing issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['backup-restore-drill', 'sev-2', 'infrastructure'],
              });
              core.info(`Opened new issue #${created.data.number}`);
            }
