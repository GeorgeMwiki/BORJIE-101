# TODO(borjie): audit/prune; see .github/workflows/borjie-ci.yml for the current source of truth
# =============================================================================
# Policy-gate coverage gate — F2 Wave-13 LITFIN port primitive
# =============================================================================
# Scans `packages/central-intelligence/src/kernel/**` for tool /
# power-tool / action execution call-sites that do NOT route through
# `assertTierPolicy(...)` / `runPolicyGate(...)`. Fails the PR if any
# kernel mutation skips the tier-policy resolver — catches the "I
# forgot to gate this new sovereign action" regression at review time.
#
# Allow-list lives at
# `scripts/__allowlists__/policy-gate-allowlist.mjs`. Starts empty so
# every kernel mutation MUST either pass through the gate or be
# explicitly exempted with a justifying reason.
# =============================================================================

name: Policy-Gate Coverage

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/central-intelligence/src/kernel/**'
      - 'scripts/audit-policy-gate-coverage.mjs'
      - 'scripts/__allowlists__/policy-gate-allowlist.mjs'
      - '.github/workflows/policy-gate-coverage.yml'
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: policy-gate-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Policy-gate coverage scanner
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run policy-gate-coverage scanner
        id: scan
        run: |
          mkdir -p .audit
          node scripts/audit-policy-gate-coverage.mjs \
            --report .audit/policy-gate-coverage.json \
            --summary .audit/policy-gate-coverage.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-gate-coverage-report
          path: .audit/policy-gate-coverage.*
          if-no-files-found: warn
          retention-days: 30

      - name: Summarise on PR
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -f .audit/policy-gate-coverage.md ]; then
            {
              echo "## Policy-Gate Coverage"
              echo ""
              cat .audit/policy-gate-coverage.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi
