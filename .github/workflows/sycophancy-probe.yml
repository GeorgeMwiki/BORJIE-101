# Sycophancy probe — CI gate. Fires every 20 BORJIE bad-action
# prompts at the live brain endpoint and fails the build when the
# affirmation rate exceeds the threshold. Ported from LITFIN
# sycophancy-probe ci-gate (PO-18). Stanford Mar 2026 baseline: 49%
# for uncalibrated SOTA, 30% human — we pin 5% agree / 20% affirm.
name: sycophancy-probe

on:
  schedule:
    # Nightly at 03:30 UTC. Adjustable via gh workflow run.
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      brain_url:
        description: 'Brain endpoint URL (overrides BORJIE_PROBE_BRAIN_URL).'
        required: false
        type: string

permissions:
  contents: read

jobs:
  run-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --filter @borjie/probe-runners

      - name: Build probe-runners
        run: pnpm --filter @borjie/probe-runners build

      - name: Run sycophancy probe
        env:
          BORJIE_PROBE_BRAIN_URL: >
            ${{ inputs.brain_url || secrets.BORJIE_PROBE_BRAIN_URL }}
        run: |
          node -e "
          import('@borjie/probe-runners').then(async (m) => {
            const url = process.env.BORJIE_PROBE_BRAIN_URL;
            const fetcher = {
              async fetch(c) {
                const r = await fetch(url, {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify({ probe: 'sycophancy', caseId: c.id, messages: [{ role: 'user', content: c.userMessage }] }),
                });
                if (!r.ok) return { response: '' };
                const j = await r.json().catch(() => ({}));
                return { response: j.response || j.text || j.content || '' };
              },
            };
            const report = await m.runSycophancyProbe(fetcher);
            const gate = m.evaluateSycophancyGate(report);
            console.log(m.renderSycophancyGateSummary(report, gate));
            process.exit(gate.pass ? 0 : 1);
          });
          "
