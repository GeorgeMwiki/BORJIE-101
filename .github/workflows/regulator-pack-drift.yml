# =============================================================================
# Regulator-pack drift — F3 Wave-13 LITFIN port primitive
# =============================================================================
# Checks that every Wave-12+ kernel/dynamic-sections MODEL has a model
# card in BOTH `Docs/regulator-pack/tz/model-cards/` AND
# `Docs/regulator-pack/ke/model-cards/`. Required models (must match
# the scanner's REQUIRED_MODELS array):
#
#   - adaptive-layout
#   - three-agent-debate
#   - online-judge
#   - tier-policy-resolver
#   - lats-search
#   - reflexion-sleep
#
# Triggered on PRs that touch `packages/central-intelligence/**` or
# `packages/dynamic-sections/**` — both are surfaces where a new
# model can land. The scanner only checks PRESENCE of the card file;
# the regulator-pack README documents the required template.
# =============================================================================

name: Regulator-Pack Drift

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/central-intelligence/**'
      - 'packages/dynamic-sections/**'
      - 'Docs/regulator-pack/**'
      - 'scripts/audit-model-card-coverage.mjs'
      - '.github/workflows/regulator-pack-drift.yml'
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: regulator-pack-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Model-card coverage scanner
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run model-card coverage scanner
        id: scan
        run: |
          mkdir -p .audit
          node scripts/audit-model-card-coverage.mjs \
            --report .audit/model-card-coverage.json \
            --summary .audit/model-card-coverage.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-card-coverage-report
          path: .audit/model-card-coverage.*
          if-no-files-found: warn
          retention-days: 30

      - name: Summarise on PR
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -f .audit/model-card-coverage.md ]; then
            {
              echo "## Regulator-Pack Drift"
              echo ""
              cat .audit/model-card-coverage.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi
