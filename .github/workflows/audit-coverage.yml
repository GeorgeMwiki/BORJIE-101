# TODO(borjie): audit/prune; see .github/workflows/borjie-ci.yml for the current source of truth
# =============================================================================
# Universal coverage audits
# =============================================================================
# Reverse-port from LITFIN's 5 universal scanners (auth / ssrf / rls / zod /
# rate-limit) PLUS 6 zero-hardcoded scanners added in Phase J7. Each
# scanner is a pure Node ESM script that walks the BORJIE monorepo and
# fails the PR on uncovered routes / tables / call-sites OR on a new
# hardcoded literal (currency, locale, jurisdiction, bank, tax-rate, mock-
# data) outside the allowed registry / Zod / allowlist surfaces.
#
# Highest defensive-leverage per hour: catches the next "I forgot to wire
# requireAuth" AND the next silent-TZ-fallback before either ships.
#
# Allow-lists live in `scripts/__allowlists__/`. Every entry requires a
# justifying reason ≥ 8 characters.
#
# Reports are uploaded as GitHub artifacts (one per scanner) so reviewers
# can drill into the markdown summary directly from the PR check.
#
# Matrix entries
#   Phase A (LITFIN reverse-port): auth, ssrf, rls, zod, rate-limit.
#   Phase J7 (zero-hardcoded posture): mock-data, hardcoded-currency,
#     hardcoded-locale, hardcoded-jurisdiction, hardcoded-bank,
#     hardcoded-tax-rate.
# =============================================================================

name: Coverage Audits

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: audit-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: ${{ matrix.audit }}-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        audit:
          # Phase A — LITFIN reverse-port (5 scanners)
          - auth
          - ssrf
          - rls
          - zod
          - rate-limit
          # Phase J7 — zero-hardcoded posture (6 scanners)
          - mock-data
          - hardcoded-currency
          - hardcoded-locale
          - hardcoded-jurisdiction
          - hardcoded-bank
          - hardcoded-tax-rate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # The scanners are pure ESM Node scripts — no pnpm setup or install
      # needed. Keeps this workflow fast (<30s) and avoids version-pin
      # conflicts between `pnpm/action-setup` and root `packageManager`.

      - name: Run ${{ matrix.audit }}-coverage scanner
        id: scan
        run: |
          mkdir -p .audit
          node scripts/audit-${{ matrix.audit }}-coverage.mjs \
            --report .audit/${{ matrix.audit }}-coverage.json \
            --summary .audit/${{ matrix.audit }}-coverage.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.audit }}-coverage-report
          path: .audit/${{ matrix.audit }}-coverage.*
          if-no-files-found: warn
          retention-days: 30

      - name: Summarise on PR
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -f .audit/${{ matrix.audit }}-coverage.md ]; then
            {
              echo "## ${{ matrix.audit }}-coverage"
              echo ""
              cat .audit/${{ matrix.audit }}-coverage.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi
