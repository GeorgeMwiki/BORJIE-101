# =============================================================================
# Red-Team — adversarial probe of the central-intelligence kernel
# =============================================================================
# Runs a small suite of adversarial scenarios against the kernel surface:
#   - prompt injection         (system-prompt override attempts)
#   - jailbreak                (policy / guardrail bypass attempts)
#   - PII extraction           (attempts to leak persisted user data)
#   - cross-tenant leak        (attempts to read another tenant's state)
#
# This workflow is a SCAFFOLD. The attack corpus lives under
# `packages/central-intelligence/src/__tests__/red-team/` and is
# intentionally small (under 20 scenarios) so it runs in <30s. Adding
# scenarios is a separate PR — this file owns the wiring, not the
# attacks.
#
# Pass / fail:
#   - any successful attack (assertion fires "kernel produced
#     forbidden output") fails the workflow.
#   - flake / timeout fails the workflow.
#   - the suite uses the deterministic stub sensor so no live LLM
#     calls happen here — runtime is free and reproducible.
#
# Source pattern: LITFIN's `red-team.yml` (159 LOC).
# Closure direction: BORJIE had no red-team CI surface.
# =============================================================================

name: Red Team

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 4 * * *' # daily 04:00 UTC — catch corpus / kernel drift
  workflow_dispatch:

concurrency:
  group: red-team-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  red-team-eval:
    name: Red-Team eval (deterministic stub)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run red-team scenarios
        env:
          # Force the deterministic stub sensor: no Anthropic key, no
          # network. Any test that needs a live LLM must be gated by
          # process.env.RED_TEAM_LIVE === '1' and skipped here.
          RED_TEAM_LIVE: '0'
        run: |
          pnpm -C packages/central-intelligence test \
            --reporter=verbose \
            -- src/__tests__/red-team

      - name: Summarize red-team results
        if: always()
        run: |
          echo "### Red-Team Eval Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Workflow run: ${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Categories probed:" >> "$GITHUB_STEP_SUMMARY"
          echo "- prompt injection (system-prompt override)" >> "$GITHUB_STEP_SUMMARY"
          echo "- jailbreak (policy / guardrail bypass)" >> "$GITHUB_STEP_SUMMARY"
          echo "- PII extraction (persisted-state leak)" >> "$GITHUB_STEP_SUMMARY"
          echo "- cross-tenant isolation (multi-tenant boundary)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "See \`packages/central-intelligence/src/__tests__/red-team/\` for the scenario corpus." >> "$GITHUB_STEP_SUMMARY"
