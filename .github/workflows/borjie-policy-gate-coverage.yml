# Borjie policy-gate coverage audit
# Source of truth for CI orchestration: .github/workflows/borjie-ci.yml
#
# Verifies that every HIGH-risk policy prefix (sovereign|kill_switch|four_eye|
# policy_rollout) seen in routes is wired into the central policy-gate kernel
# at packages/central-intelligence/src/kernel/policy-gate.ts. Closes
# PARITY_AUDIT_2026_05_26 section 14a.
name: Borjie policy-gate coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: borjie-policy-gate-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-gate-coverage:
    name: policy-gate coverage audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm

      - name: Run policy-gate coverage audit
        id: audit
        run: node scripts/audit-policy-gate-coverage.mjs | tee policy-gate-coverage.log

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: borjie-policy-gate-coverage-log
          path: policy-gate-coverage.log
          if-no-files-found: warn
