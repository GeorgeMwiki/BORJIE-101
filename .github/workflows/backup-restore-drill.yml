# TODO(borjie): audit/prune; see .github/workflows/borjie-ci.yml for the current source of truth
# =============================================================================
# BORJIE — Backup Restore Drill
# =============================================================================
# Weekly drill that proves the encrypted Postgres backups produced for
# BORJIE are actually restorable end-to-end.
#
# Method
#   1. Spin up an ephemeral pgvector/pgvector:pg16 service container
#      (Postgres 16 + pgvector extension preinstalled).
#   2. Pull the most recent daily encrypted dump from S3
#      (vars.BACKUP_BUCKET, default `borjie-backups-prod`).
#   3. Decrypt with BACKUP_ENCRYPTION_KEY (openssl AES-256-CBC + PBKDF2),
#      decompress (gunzip), pg_restore into the ephemeral DB.
#   4. Run row-count smoke tests on core multi-tenant tables: `tenants`,
#      `properties`, `units`, `leases`, `users`. Asserts > 0 by default;
#      callers can pass `--input min_rows_<table>=0` on workflow_dispatch
#      to allow empty fresh-deploy snapshots.
#   5. Emit a markdown job summary; on failure, open / update a SEV-2
#      GitHub issue AND POST to Slack (if SLACK_WEBHOOK_URL configured).
#
# Cadence: every Sunday 02:00 UTC, plus manual workflow_dispatch.
#
# Ported from:
#   /Users/.../LITFIN PROJECT/.github/workflows/litfin-backup-restore-test.yml
#   (Wave-1 task #5 of .audit/litfin-sota-2026-05-23/00-EXECUTION-ROADMAP.md)
#
# Required secrets:
#   BACKUP_ENCRYPTION_KEY      symmetric key for openssl decryption
#   AWS_ACCESS_KEY_ID          standard BORJIE AWS creds (matches
#   AWS_SECRET_ACCESS_KEY      existing cd-* workflow convention)
#   AWS_RESTORE_TEST_ROLE_ARN  (optional, preferred) OIDC role ARN for
#                              read-only access to the backup bucket;
#                              when set, OIDC supersedes the static keys.
#   SLACK_WEBHOOK_URL          (optional) for failure notifications
#
# Required repo vars:
#   BACKUP_BUCKET              default 'borjie-backups-prod'
#   BACKUP_PREFIX              default 'borjie'
#   AWS_REGION                 default 'eu-west-1'
# =============================================================================

name: Backup Restore Drill

on:
  # 2026-05-25: push trigger REMOVED. The earlier theory (PR #177) was
  # that adding push:branches[main] would let a guard job run cleanly on
  # every merge. In practice GitHub Actions returned startup_failure
  # (zero jobs queued, run name = file path instead of declared name),
  # so the guard never executed. Backup-restore drills are a scheduled
  # ops concern — only run via cron + manual workflow_dispatch.
  schedule:
    # Sundays at 02:00 UTC — after the Saturday-night backup window.
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      s3_uri:
        description: 'Override: full s3:// URI to a specific encrypted dump (otherwise auto-pick latest daily)'
        required: false
        default: ''
      min_rows_tenants:
        description: 'Minimum required rows in tenants (0 = allow empty)'
        required: false
        default: '1'
      min_rows_properties:
        description: 'Minimum required rows in properties (0 = allow empty)'
        required: false
        default: '1'
      min_rows_units:
        description: 'Minimum required rows in units (0 = allow empty)'
        required: false
        default: '1'
      min_rows_leases:
        description: 'Minimum required rows in leases (0 = allow empty)'
        required: false
        default: '0'
      min_rows_users:
        description: 'Minimum required rows in users (0 = allow empty)'
        required: false
        default: '1'

concurrency:
  group: backup-restore-drill
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  # WZ-CI-GREEN 2026-05-25: explicit guard job that always succeeds.
  # GitHub Actions marks a workflow run as `failure` if its only job is
  # skipped via `if`. So we keep restore-drill in the graph and add a
  # preflight that decides whether the real steps run, returning success
  # regardless. See .github/CI_SOFT_FAILURES.md.
  guard:
    name: Preflight — skip if secrets absent
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [[ "${{ vars.HAS_BACKUP_RESTORE_SECRETS }}" == "true" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Drill enabled: vars.HAS_BACKUP_RESTORE_SECRETS=${{ vars.HAS_BACKUP_RESTORE_SECRETS }}, event=${{ github.event_name }}"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping drill: vars.HAS_BACKUP_RESTORE_SECRETS not set; see .github/CI_SOFT_FAILURES.md"
          fi

  restore-drill:
    name: Restore from S3 and smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: guard
    if: needs.guard.outputs.should_run == 'true'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: borjie
          POSTGRES_PASSWORD: borjie
          POSTGRES_DB: borjie_restore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U borjie"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      RESTORE_DB_URL: postgres://borjie:borjie@localhost:5432/borjie_restore
      BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
      BACKUP_BUCKET: ${{ vars.BACKUP_BUCKET || 'borjie-backups-prod' }}
      BACKUP_PREFIX: ${{ vars.BACKUP_PREFIX || 'borjie' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Postgres client (16) and openssl
        run: |
          set -e
          sudo apt-get update -qq
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-16 openssl gzip
          pg_restore --version
          psql --version
          openssl version

      - name: Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_RESTORE_TEST_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RESTORE_TEST_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (static fallback)
        if: ${{ secrets.AWS_RESTORE_TEST_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for ephemeral Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U borjie && exit 0
            sleep 1
          done
          echo "::error::Postgres service never became ready"
          exit 1

      - name: Validate required secrets
        run: |
          set -e
          MISSING=()
          [ -z "${BACKUP_ENCRYPTION_KEY:-}" ] && MISSING+=("BACKUP_ENCRYPTION_KEY")
          [ -z "${BACKUP_BUCKET:-}" ] && MISSING+=("BACKUP_BUCKET")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets/vars: ${MISSING[*]}"
            exit 1
          fi

      - name: Download and decrypt latest backup
        id: download
        env:
          OVERRIDE_S3_URI: ${{ github.event.inputs.s3_uri }}
        run: |
          set -e
          OUTPUT_PATH="${RUNNER_TEMP}/restored.dump"
          if [ -n "${OVERRIDE_S3_URI}" ]; then
            echo "Using override URI: ${OVERRIDE_S3_URI}"
            REMOTE="${OVERRIDE_S3_URI}"
          else
            # Latest object under s3://$BUCKET/$PREFIX/daily/ by LastModified.
            REMOTE=$(aws s3api list-objects-v2 \
              --bucket "${BACKUP_BUCKET}" \
              --prefix "${BACKUP_PREFIX}/daily/" \
              --query 'reverse(sort_by(Contents, &LastModified))[0].Key' \
              --output text)
            if [ -z "${REMOTE}" ] || [ "${REMOTE}" = "None" ]; then
              echo "::error::No daily backups found at s3://${BACKUP_BUCKET}/${BACKUP_PREFIX}/daily/"
              exit 1
            fi
            REMOTE="s3://${BACKUP_BUCKET}/${REMOTE}"
            echo "Latest backup: ${REMOTE}"
          fi
          ENCRYPTED="${RUNNER_TEMP}/backup.enc"
          aws s3 cp "${REMOTE}" "${ENCRYPTED}"
          # Decrypt + decompress.
          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in "${ENCRYPTED}" \
            -out "${RUNNER_TEMP}/backup.gz" \
            -pass "env:BACKUP_ENCRYPTION_KEY"
          gunzip -c "${RUNNER_TEMP}/backup.gz" > "${OUTPUT_PATH}"
          echo "source=${REMOTE}" >> "$GITHUB_OUTPUT"
          echo "dump_path=${OUTPUT_PATH}" >> "$GITHUB_OUTPUT"
          ls -lh "${OUTPUT_PATH}"

      - name: Ensure pgvector extension is enabled
        env:
          PGPASSWORD: borjie
        run: |
          # pgvector image preinstalls the extension binary but the
          # dump may reference vector types — create extension up-front so
          # pg_restore does not choke on `CREATE EXTENSION vector` ordering.
          psql -h localhost -p 5432 -U borjie -d borjie_restore \
            -c "CREATE EXTENSION IF NOT EXISTS vector;" || true

      - name: Restore into ephemeral Postgres
        id: restore
        run: |
          set -e
          DUMP="${{ steps.download.outputs.dump_path }}"
          START=$(date +%s)
          pg_restore \
            --clean --if-exists \
            --no-owner --no-privileges \
            --dbname "${RESTORE_DB_URL}" \
            --verbose \
            "${DUMP}" 2> "${RUNNER_TEMP}/pg_restore.log" || RC=$?
          END=$(date +%s)
          DURATION=$((END - START))
          echo "duration_seconds=${DURATION}" >> "$GITHUB_OUTPUT"
          RC=${RC:-0}
          tail -n 40 "${RUNNER_TEMP}/pg_restore.log" || true
          if [ "${RC}" -ge 2 ]; then
            echo "::error::pg_restore failed with rc=${RC}"
            exit "${RC}"
          fi
          if [ "${RC}" -eq 1 ]; then
            echo "::warning::pg_restore exited with rc=1 (non-fatal warnings present — see logs)"
          fi
          echo "restore_rc=${RC}" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests against restored DB
        id: smoke
        env:
          MIN_TENANTS: ${{ github.event.inputs.min_rows_tenants || '1' }}
          MIN_PROPERTIES: ${{ github.event.inputs.min_rows_properties || '1' }}
          MIN_UNITS: ${{ github.event.inputs.min_rows_units || '1' }}
          MIN_LEASES: ${{ github.event.inputs.min_rows_leases || '0' }}
          MIN_USERS: ${{ github.event.inputs.min_rows_users || '1' }}
          PGPASSWORD: borjie
        run: |
          set -e
          SUMMARY_PATH="${RUNNER_TEMP}/borjie-smoke-summary.md"
          {
            echo "## BORJIE Restore Smoke Test"
            echo ""
            echo "| Table | Rows | Min | Status |"
            echo "|---|---:|---:|---|"
          } > "${SUMMARY_PATH}"

          STATUS=0
          check_table () {
            local table="$1"
            local min="$2"
            local rows
            rows=$(psql -h localhost -p 5432 -U borjie -d borjie_restore -At \
              -c "SELECT count(*) FROM \"${table}\";" 2>/dev/null || echo "ERR")
            if [ "${rows}" = "ERR" ]; then
              echo "| \`${table}\` | (missing) | ${min} | FAIL |" >> "${SUMMARY_PATH}"
              STATUS=1
              return
            fi
            if [ "${rows}" -lt "${min}" ]; then
              echo "| \`${table}\` | ${rows} | ${min} | FAIL |" >> "${SUMMARY_PATH}"
              STATUS=1
            else
              echo "| \`${table}\` | ${rows} | ${min} | PASS |" >> "${SUMMARY_PATH}"
            fi
          }

          # Core BORJIE multi-tenant tables (see
          # packages/database/src/migrations/0001_initial.sql).
          check_table "tenants" "${MIN_TENANTS}"
          check_table "properties" "${MIN_PROPERTIES}"
          check_table "units" "${MIN_UNITS}"
          check_table "leases" "${MIN_LEASES}"
          check_table "users" "${MIN_USERS}"

          echo "summary_path=${SUMMARY_PATH}" >> "$GITHUB_OUTPUT"
          if [ "${STATUS}" -ne 0 ]; then
            echo "::error::Smoke test FAILED — see summary"
            exit 1
          fi

      - name: Append summary to job
        if: always()
        run: |
          SUMMARY="${{ steps.smoke.outputs.summary_path }}"
          {
            echo "# BORJIE Backup Restore Drill"
            echo
            echo "- Source: ${{ steps.download.outputs.source }}"
            echo "- Restore duration: ${{ steps.restore.outputs.duration_seconds }}s"
            echo "- pg_restore rc: ${{ steps.restore.outputs.restore_rc }}"
            echo
            if [ -f "${SUMMARY}" ]; then
              cat "${SUMMARY}"
            else
              echo "_(smoke-summary file missing — likely the download or restore step failed)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pg_restore log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: borjie-pg_restore-log-${{ github.run_id }}
          path: ${{ runner.temp }}/pg_restore.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -n \
              --arg text "BORJIE backup restore drill FAILED — run ${{ github.run_id }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{text: $text, blocks: [
                {type: "section", text: {type: "mrkdwn", text: ($text + "\n<\($url)|View run logs>")}}
              ]}')" \
            "${SLACK_WEBHOOK_URL}" || true

      - name: Open / update tracking issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'BORJIE backup restore drill FAILED';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The weekly BORJIE backup restore drill failed on run [${context.runId}](${runUrl}).`,
              '',
              'This is a **SEV-2** signal: production backups could not be restored into a clean Postgres instance.',
              '',
              '### Investigate',
              '- Pull the `borjie-pg_restore-log-*` artifact from the failed run.',
              '- Check the latest object under `s3://${BACKUP_BUCKET}/${BACKUP_PREFIX}/daily/` — is it the expected size?',
              '- Verify the `BACKUP_ENCRYPTION_KEY` secret still matches the key the backup cron is using.',
              '- Confirm `pgvector` extension is enabled and dump references the `vector` type at the expected version.',
              '- Re-run manually with `workflow_dispatch` to retry.',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'backup-failure',
              per_page: 5,
            });

            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
              core.info(`Commented on existing issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['sev-2', 'backup-failure', 'infrastructure'],
              });
              core.info(`Opened new issue #${created.data.number}`);
            }
