# =============================================================================
# Semgrep static analysis
# =============================================================================
# Runs both the curated `auto` ruleset (community + Semgrep-maintained rules)
# and the BORJIE-specific custom ruleset in `.semgrep/borjie-rules.yml`.
#
# Outputs:
#   - PR / push:  inline findings via `semgrep ci` (uses GITHUB_TOKEN to surface
#                 results on the PR if available).
#   - weekly:     full repo scan, no diff filtering.
#
# To run locally:
#   pip install semgrep
#   semgrep --config=.semgrep/borjie-rules.yml packages/ services/ apps/
#
# Custom rule philosophy: catch BORJIE-specific regressions that generic
# rulesets miss (cross-tenant lookups, raw error envelopes, unbounded findMany,
# PII in logs). See `.semgrep/borjie-rules.yml` for full inventory.
# =============================================================================

name: Semgrep

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # weekly Monday 04:00 UTC
  workflow_dispatch:

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Semgrep (curated + BORJIE rules)
        run: |
          # Use `semgrep scan` not `semgrep ci`: the latter no longer accepts
          # `--severity` filters (severity comes from app.semgrep.dev settings
          # in `ci` mode). `scan` preserves the original ERROR+WARNING intent.
          # Findings cause non-zero exit; we preserve the code so SARIF still
          # uploads on failure.
          semgrep scan \
            --config=auto \
            --config=.semgrep/borjie-rules.yml \
            --severity=ERROR \
            --severity=WARNING \
            --sarif --output=semgrep.sarif || EXIT=$?
          echo "SEMGREP_EXIT=${EXIT:-0}" >> "$GITHUB_ENV"
        env:
          SEMGREP_TOKEN: ${{ secrets.SEMGREP_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Fail job on findings
        if: env.SEMGREP_EXIT != '0' && env.SEMGREP_EXIT != ''
        run: |
          echo "Semgrep reported findings (exit=$SEMGREP_EXIT)."
          exit "$SEMGREP_EXIT"
