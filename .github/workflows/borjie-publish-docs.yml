# =============================================================================
# Borjie — Publish API Docs to GitHub Pages
# =============================================================================
# Builds a static documentation site for the Borjie mining OpenAPI spec and
# deploys it to GitHub Pages.
#
# The site exposes three views over `docs/openapi/borjie-mining.yaml`:
#   - Swagger UI    (interactive try-it-out)
#   - ReDoc         (three-pane reference)
#   - Raw YAML      (for tooling / partners)
#
# This is the public-internet alternative to the in-app docs at
# `/api/v1/mining/docs`, which require the api-gateway service to be
# running.
#
# Triggers
#   - push to `main` touching the spec or the mining route handlers
#     (so the published site never drifts from the committed spec).
#   - manual `workflow_dispatch` for ad-hoc republishes.
#
# Output
#   https://georgemwiki.github.io/BORJIE-101/
# =============================================================================

name: Borjie — Publish API Docs

on:
  push:
    branches: [main]
    paths:
      # The file is tracked at `Docs/openapi/...` on the case-sensitive
      # Linux runner — list both spellings to cover any future case
      # flip after this clone is regenerated on a case-sensitive fs.
      - "docs/openapi/**"
      - "Docs/openapi/**"
      - "services/api-gateway/src/routes/mining/**"
      - "scripts/generate-openapi-spec.mjs"
      - "scripts/build-mining-openapi-spec.ts"
      - "scripts/openapi/**"
      - "scripts/openapi-component-schemas.mjs"
      - "scripts/build-pages-site.mjs"
      - ".github/workflows/borjie-publish-docs.yml"
  workflow_dispatch:

# Allow one concurrent deployment; cancel in-flight runs when a newer push
# arrives so the latest commit always wins.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build static docs site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm 8
        uses: pnpm/action-setup@v4
        with:
          version: "8.15.0"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate OpenAPI spec
        run: node scripts/generate-openapi-spec.mjs

      - name: Build static Pages site
        run: node scripts/build-pages-site.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
