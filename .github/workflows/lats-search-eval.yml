# TODO(borjie): audit/prune; see .github/workflows/borjie-ci.yml for the current source of truth
# =============================================================================
# LATS-search eval — F9 Wave-13 LITFIN port primitive
# =============================================================================
# Runs an apples-to-apples eval comparing the LATS tree-search planner
# (`lats-search.ts`) to the existing Tree-of-Thoughts beam planner
# (`search-planner.ts`) on a fixed deterministic problem set.
#
# Compared metrics (per-planner aggregate):
#   - bestScore       — best leaf score (higher better)
#   - expansionsUsed  — # of expander calls
#   - tokensUsed      — synthetic budget unit consumed
#   - wallClockMs     — host wall-clock duration
#
# CI gate: LATS bestScore must stay within 10% of ToT bestScore at the
# same token budget. A larger regression hard-fails the workflow so we
# notice if a "refactor the planner" PR silently degrades search.
#
# The harness is deterministic and in-process — no LLM calls, free,
# < 10s. See `scripts/eval-lats-vs-tot.mjs` for the simulator.
# =============================================================================

name: LATS Search Eval

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/central-intelligence/src/kernel/orchestrator/lats-search.ts'
      - 'packages/central-intelligence/src/kernel/orchestrator/lats-types.ts'
      - 'packages/central-intelligence/src/kernel/orchestrator/search-planner.ts'
      - 'scripts/eval-lats-vs-tot.mjs'
      - '.github/workflows/lats-search-eval.yml'
  workflow_dispatch:
    inputs:
      budget:
        description: 'Token budget per planner (default 800)'
        required: false
        default: '800'
      max_regression:
        description: 'Allowed LATS regression vs ToT (default 0.10)'
        required: false
        default: '0.10'

concurrency:
  group: lats-search-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: LATS vs ToT regression eval
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run LATS-vs-ToT eval
        id: eval
        # Pipe workflow_dispatch inputs through env vars instead of
        # direct shell interpolation to close the Semgrep
        # `run-shell-injection` ERROR. The script reads the same values
        # via process.env, no behaviour change.
        env:
          EVAL_BUDGET: ${{ inputs.budget || '800' }}
          EVAL_MAX_REGRESSION: ${{ inputs.max_regression || '0.10' }}
        run: |
          mkdir -p .audit
          node scripts/eval-lats-vs-tot.mjs \
            --report .audit/lats-vs-tot.json \
            --budget "$EVAL_BUDGET" \
            --max-regression "$EVAL_MAX_REGRESSION"

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lats-vs-tot-eval
          path: .audit/lats-vs-tot.json
          if-no-files-found: warn
          retention-days: 30

      - name: Summarise on PR
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -f .audit/lats-vs-tot.json ]; then
            TOT=$(node -e "const r=require('./.audit/lats-vs-tot.json');console.log(r.aggregate.bestScore.tot.toFixed(3))")
            LATS=$(node -e "const r=require('./.audit/lats-vs-tot.json');console.log(r.aggregate.bestScore.lats.toFixed(3))")
            {
              echo "## LATS Search Eval"
              echo ""
              echo "| metric | ToT | LATS |"
              echo "|---|---|---|"
              echo "| bestScore (avg) | ${TOT} | ${LATS} |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
