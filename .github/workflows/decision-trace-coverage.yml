# =============================================================================
# Decision-trace coverage gate — F10 Wave-13 LITFIN port primitive
# =============================================================================
# Scans `services/api-gateway/src/routes/**` for mutating handlers
# (POST/PUT/PATCH/DELETE) that do NOT route through the DecisionTrace
# abstraction. Fails the PR if any mutation route lacks trace coverage,
# so every state-changing call lands a per-thought breadcrumb in the
# trace store (SOC 2 CC7.2, regulator-pack audit-trail evidence).
#
# Detection rules — see `scripts/audit-decision-trace-coverage.mjs`:
#   - direct `startDecisionTrace(` / `recorder.begin(` /
#     `traceWriter.step(` call OR
#   - import from a `decision-trace` module / kernel facade OR
#   - context-bound `c.get('decisionTrace' | 'traceWriter')`
# =============================================================================

name: Decision-Trace Coverage

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/api-gateway/src/routes/**'
      - 'scripts/audit-decision-trace-coverage.mjs'
      - '.github/workflows/decision-trace-coverage.yml'
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: decision-trace-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Decision-trace coverage scanner
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run decision-trace-coverage scanner
        id: scan
        run: |
          mkdir -p .audit
          node scripts/audit-decision-trace-coverage.mjs \
            --report .audit/decision-trace-coverage.json \
            --summary .audit/decision-trace-coverage.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decision-trace-coverage-report
          path: .audit/decision-trace-coverage.*
          if-no-files-found: warn
          retention-days: 30

      - name: Summarise on PR
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -f .audit/decision-trace-coverage.md ]; then
            {
              echo "## Decision-Trace Coverage"
              echo ""
              cat .audit/decision-trace-coverage.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi
