# =============================================================================
# Live Test — full BORJIE happy-path E2E against a test-only Supabase
# project + the api-gateway.
#
# Trigger: `workflow_dispatch` ONLY. This is a manual / scheduled gate, NOT a
# PR check — it talks to a real Supabase project and uses real (test-only)
# credentials. Running it on every PR would burn Supabase quota and surface
# noise unrelated to the diff under review.
#
# What it does
#   1. Spins up Postgres + Redis service containers for the api-gateway's
#      dependencies.
#   2. Boots the api-gateway with env pointed at the test-only Supabase
#      project (DATABASE_URL is the Supabase pooler URL; JWT_SECRET matches
#      SUPABASE_JWT_SECRET).
#   3. Waits for /healthz.
#   4. Runs `pnpm live-test` (the 10 sequential specs).
#   5. Uploads the Playwright HTML report + traces on failure.
#
# Secrets the workflow expects (configured at the repository or org level):
#   - LIVE_TEST_SUPABASE_URL          — test-only project URL
#   - LIVE_TEST_SUPABASE_ANON_KEY     — test-only anon key
#   - LIVE_TEST_SUPABASE_SERVICE_KEY  — test-only service role key
#   - LIVE_TEST_SUPABASE_JWT_SECRET   — test-only HS256 secret
#   - LIVE_TEST_DATABASE_URL          — pooled connection string
#   - LIVE_TEST_OWNER_EMAIL / PASSWORD — bootstrap owner creds
#   - LIVE_TEST_OTHER_EMAIL / PASSWORD — cross-tenant deny user creds
#   - LIVE_TEST_JWT_SECRET            — api-gateway-issued service tokens
#   - LIVE_TEST_INTERNAL_API_KEY      — internal endpoint key
# =============================================================================

name: Live Test (Supabase + Gateway)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are we running live-test? (release-cut / smoke / debug)'
        required: false
        default: 'manual'

concurrency:
  # Live-test is destructive on its test-only Supabase project (the suite
  # creates and deletes a tenant). Serialize so two concurrent runs do not
  # collide on the bootstrap users.
  group: live-test-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  live-test:
    name: Run pnpm live-test against test Supabase + gateway
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      NODE_VERSION: '20'
      # Live-test specific.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.LIVE_TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.LIVE_TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.LIVE_TEST_SUPABASE_SERVICE_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.LIVE_TEST_SUPABASE_JWT_SECRET }}
      DATABASE_URL: ${{ secrets.LIVE_TEST_DATABASE_URL }}
      LIVE_TEST_OWNER_EMAIL: ${{ secrets.LIVE_TEST_OWNER_EMAIL }}
      LIVE_TEST_OWNER_PASSWORD: ${{ secrets.LIVE_TEST_OWNER_PASSWORD }}
      LIVE_TEST_OTHER_EMAIL: ${{ secrets.LIVE_TEST_OTHER_EMAIL }}
      LIVE_TEST_OTHER_PASSWORD: ${{ secrets.LIVE_TEST_OTHER_PASSWORD }}
      # api-gateway internals.
      JWT_SECRET: ${{ secrets.LIVE_TEST_JWT_SECRET }}
      INTERNAL_API_KEY: ${{ secrets.LIVE_TEST_INTERNAL_API_KEY }}
      SESSION_HASH_SECRET: ${{ secrets.LIVE_TEST_JWT_SECRET }}
      REDIS_URL: redis://localhost:6379
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:4000
      API_GATEWAY_URL: http://localhost:4000
      # Mock the M-Pesa STK so spec 06 exercises the webhook path without
      # needing Daraja sandbox creds in CI.
      MPESA_ENVIRONMENT: mock

    steps:
      - name: Why are we running
        # Pass the workflow input through an env var rather than direct
        # ${{ ... }} interpolation into the shell — the latter is a
        # script-injection seam (Semgrep `run-shell-injection` ERROR).
        env:
          WORKFLOW_REASON: ${{ github.event.inputs.reason }}
        run: |
          printf 'reason=%s\n' "$WORKFLOW_REASON"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate live-test secrets are set
        run: |
          missing=()
          for var in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY \
                    SUPABASE_JWT_SECRET DATABASE_URL \
                    LIVE_TEST_OWNER_EMAIL LIVE_TEST_OWNER_PASSWORD \
                    LIVE_TEST_OTHER_EMAIL LIVE_TEST_OTHER_PASSWORD \
                    JWT_SECRET INTERNAL_API_KEY ; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::live-test secrets not configured: ${missing[*]}"
            exit 1
          fi
          echo "All live-test secrets present"

      - name: Build api-gateway
        run: pnpm --filter @borjie/api-gateway build

      - name: Start api-gateway in background
        run: |
          pnpm --filter @borjie/api-gateway start > gateway.log 2>&1 &
          echo "GATEWAY_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for api-gateway /healthz
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:4000/healthz > /dev/null; then
              echo "api-gateway is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::api-gateway did not become ready in 60s"
          echo "---- gateway.log (tail) ----"
          tail -200 gateway.log || true
          exit 1

      - name: Run pnpm live-test
        run: pnpm live-test

      - name: Tail api-gateway log on failure
        if: failure()
        run: tail -500 gateway.log || true

      - name: Stop api-gateway
        if: always()
        run: |
          if [ -n "$GATEWAY_PID" ]; then
            kill "$GATEWAY_PID" 2>/dev/null || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-test-playwright-report
          path: e2e/live-test/report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload gateway log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-test-gateway-log
          path: gateway.log
          if-no-files-found: warn
          retention-days: 14
