# =============================================================================
# Consolidation-worker CronJob — Wave-K Tier-3 W-Ops
# =============================================================================
# Daily ingestion that pulls unconsumed kernel_cot_reservoir rows captured in
# the last 24h and writes one consolidated semantic fact per group via
# `createSemanticMemoryService.upsertFact`.
#
# Mirrors the wake-loop CronJob in shape — reuses the api-gateway image
# which already carries the full workspace + tsx so we can run the
# consolidation-worker entrypoint without a dedicated image build.
#
# Schedule: 02:00 UTC daily — far enough from the wake-loop's 15-min cadence
# that the two never compete for the pool.
#
# Idempotency: the worker only consumes rows where consolidated_at IS NULL
# and marks them after a successful semantic write. A double-fire on the
# same set produces an idempotent upsert (same (tenantId, userId, key)).
#
# Apply: kubectl apply -f k8s/consolidation-worker-cron.yaml
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: borjie-consolidation-worker
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/component: consolidation-worker-cron
    app.kubernetes.io/part-of: borjie
spec:
  # 02:00 UTC daily — quiet window between wake-loop ticks. Operators can
  # tune to */30 for faster reservoir drain during a backfill.
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: borjie
            app.kubernetes.io/component: consolidation-worker-cron
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: consolidation-worker
              image: ghcr.io/georgemwikila/borjie/api-gateway:latest
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              # Run the worker's CLI guard — services/consolidation-worker/
              # src/index.ts boots a single tick on import + relies on the
              # CONSOLIDATION_INTERVAL_MS=0 hint to skip the in-process
              # supervisor's setInterval and exit cleanly after the first
              # tick (CronJob owns the cadence).
              command:
                - "node_modules/.bin/tsx"
                - "services/consolidation-worker/src/index.ts"
              workingDir: /app
              env:
                - name: NODE_ENV
                  value: "production"
                - name: CONSOLIDATION_INTERVAL_MS
                  value: "0"
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: borjie-secrets
                      key: DATABASE_URL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
