apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "borjie.fullname" . }}-config
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  SENTRY_ENVIRONMENT: "production"
  POSTHOG_HOST: "https://eu.posthog.com"
  CORS_ALLOWED_ORIGINS: "https://borjie.com,https://admin.borjie.com,https://owners.borjie.com,https://manage.borjie.com"
