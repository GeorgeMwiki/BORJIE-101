# =============================================================================
# HAProxy — Postgres primary discovery (fallback / alternative to label-based Service)
# =============================================================================
# Two replicas behind a ClusterIP Service for redundancy. Each replica probes
# Patroni REST :8008 endpoints on the StatefulSet pods.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-haproxy-cfg
  namespace: borjie-data
data:
  haproxy.cfg: |
    global
      maxconn 4096
      log stdout format raw local0

    defaults
      log global
      mode tcp
      retries 2
      timeout client  30m
      timeout connect 4s
      timeout server  30m
      timeout check   5s

    listen stats
      mode http
      bind *:7000
      stats enable
      stats uri /
      stats refresh 10s

    listen postgres-primary
      bind *:5432
      option httpchk
      http-check send meth GET uri /master
      http-check expect status 200
      default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
      server postgres-patroni-0 postgres-patroni-0.postgres-headless.borjie-data.svc.cluster.local:5432 check port 8008
      server postgres-patroni-1 postgres-patroni-1.postgres-headless.borjie-data.svc.cluster.local:5432 check port 8008
      server postgres-patroni-2 postgres-patroni-2.postgres-headless.borjie-data.svc.cluster.local:5432 check port 8008

    listen postgres-replicas
      bind *:5433
      balance roundrobin
      option httpchk
      http-check send meth GET uri /replica
      http-check expect status 200
      default-server inter 3s fall 3 rise 2
      server postgres-patroni-0 postgres-patroni-0.postgres-headless.borjie-data.svc.cluster.local:5432 check port 8008
      server postgres-patroni-1 postgres-patroni-1.postgres-headless.borjie-data.svc.cluster.local:5432 check port 8008
      server postgres-patroni-2 postgres-patroni-2.postgres-headless.borjie-data.svc.cluster.local:5432 check port 8008
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-haproxy
  namespace: borjie-data
  labels:
    app.kubernetes.io/name: postgres-haproxy
spec:
  selector:
    app.kubernetes.io/name: postgres-haproxy
  ports:
    - name: writes
      port: 5432
      targetPort: 5432
    - name: reads
      port: 5433
      targetPort: 5433
    - name: stats
      port: 7000
      targetPort: 7000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-haproxy
  namespace: borjie-data
  labels:
    app.kubernetes.io/name: postgres-haproxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-haproxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-haproxy
        app.kubernetes.io/component: postgres-router
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: postgres-haproxy
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 99           # haproxy:2.9-alpine ships UID 99 for the `haproxy` user
        runAsGroup: 99
        fsGroup: 99
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: haproxy
          image: haproxy:2.9-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 5432
              name: writes
            - containerPort: 5433
              name: reads
            - containerPort: 7000
              name: stats
          livenessProbe:
            httpGet:
              path: /
              port: 7000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: cfg
              mountPath: /usr/local/etc/haproxy
              readOnly: true
      volumes:
        - name: cfg
          configMap:
            name: postgres-haproxy-cfg
