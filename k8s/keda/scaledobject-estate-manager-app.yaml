---
# KEDA ScaledObject for estate-manager-app.
# Scales to 0 when idle — managers don't always have the dashboard open.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: estate-manager-app
  namespace: borjie
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/component: estate-manager-app
    app.kubernetes.io/managed-by: helm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: estate-manager-app
  pollingInterval: 10
  cooldownPeriod: 600     # 10 min idle before scaling down
  minReplicaCount: 0
  maxReplicaCount: 20
  fallback:
    failureThreshold: 3
    replicas: 1
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - { type: Percent, value: 50, periodSeconds: 60 }
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - { type: Percent, value: 100, periodSeconds: 15 }
            - { type: Pods, value: 4, periodSeconds: 15 }
          selectPolicy: Max
  triggers:
    # TODO(scaffold): replace host with the real manager domain.
    - type: http-add-on
      metadata:
        hosts: manager.borjie.example.com
        pathPrefixes: /
        scalingMetric: requestRate
        targetValue: "20"
        granularity: 1s
        window: 1m
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: estate_manager_app_rps
        threshold: "20"
        query: |
          sum(rate(http_requests_total{namespace="borjie",app="estate-manager-app"}[1m]))
