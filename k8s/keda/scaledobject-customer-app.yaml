---
# KEDA ScaledObject for customer-app.
# customer-app is the always-warm tenant portal — minReplicaCount > 0.
# This scaler still kicks above the HPA minimum when RPS spikes.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: customer-app
  namespace: borjie
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/component: customer-app
    app.kubernetes.io/managed-by: helm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: customer-app
  pollingInterval: 10
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 30
  fallback:
    failureThreshold: 3
    replicas: 2
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - { type: Percent, value: 50, periodSeconds: 60 }
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - { type: Percent, value: 100, periodSeconds: 15 }
            - { type: Pods, value: 4, periodSeconds: 15 }
          selectPolicy: Max
  triggers:
    # TODO(scaffold): replace host with real tenant domain.
    - type: http-add-on
      metadata:
        hosts: tenant.borjie.example.com
        pathPrefixes: /
        scalingMetric: requestRate
        targetValue: "30"
        granularity: 1s
        window: 1m
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: customer_app_rps
        threshold: "30"
        query: |
          sum(rate(http_requests_total{namespace="borjie",app="customer-app"}[1m]))
