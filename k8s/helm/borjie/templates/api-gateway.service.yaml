{{- $w := .Values.services.apiGateway -}}
{{- if $w.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $w.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $w.name }}
spec:
  type: ClusterIP   # Internal only. Never expose via Ingress.
  selector:
    {{- include "borjie.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $w.name }}
  ports:
    - { name: http, port: {{ $w.port }}, targetPort: http, protocol: TCP }
{{- end }}
