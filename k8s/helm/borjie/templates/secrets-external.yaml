{{- if .Values.externalSecrets.enabled -}}
# External Secrets Operator (ESO) — pulls secrets from the configured
# backend (GCP Secret Manager / AWS Secrets Manager / Vault) and
# materialises Kubernetes Secret objects.
#
# Workload Identity (GCP) / IRSA (AWS) is the auth model — no JSON keys
# in the cluster.
{{- if eq .Values.secrets.provider "gcp" }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: borjie-secret-store
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.secrets.gcp.projectID }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.secrets.gcp.workloadIdentity.clusterLocation }}
          clusterName: {{ .Values.secrets.gcp.workloadIdentity.clusterName }}
          serviceAccountRef:
            name: borjie
{{- else if eq .Values.secrets.provider "aws" }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: borjie-secret-store
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.secrets.aws.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: borjie
{{- end }}
---
# Application-wide secrets shared by all 4 frontends + api-gateway + reports.
# TODO(scaffold): seed each remoteRef.key into the secrets backend before
# running `helm install`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: borjie-secret-store
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # ── Supabase ──
    - secretKey: NEXT_PUBLIC_SUPABASE_URL
      remoteRef: { key: NEXT_PUBLIC_SUPABASE_URL }
    - secretKey: NEXT_PUBLIC_SUPABASE_ANON_KEY
      remoteRef: { key: NEXT_PUBLIC_SUPABASE_ANON_KEY }
    - secretKey: SUPABASE_SERVICE_ROLE_KEY
      remoteRef: { key: SUPABASE_SERVICE_ROLE_KEY }
    # ── Database (used by api-gateway, reports, payments-ledger) ──
    - secretKey: DATABASE_URL
      remoteRef: { key: DATABASE_URL }
    - secretKey: DATABASE_URL_READ
      remoteRef: { key: DATABASE_URL_READ }
    # ── Redis ──
    - secretKey: REDIS_URL
      remoteRef: { key: REDIS_URL }
    # ── Field encryption ──
    - secretKey: FIELD_ENCRYPTION_MASTER_KEY
      remoteRef: { key: FIELD_ENCRYPTION_MASTER_KEY }
    - secretKey: HASH_CHAIN_PEPPER
      remoteRef: { key: HASH_CHAIN_PEPPER }
    # ── Observability ──
    - secretKey: SENTRY_DSN
      remoteRef: { key: SENTRY_DSN }
    - secretKey: POSTHOG_API_KEY
      remoteRef: { key: POSTHOG_API_KEY }
    # TODO(scaffold): add the remaining ~50 env-vars from .env.example.
---
# payments-ledger-only secrets (Stripe, M-Pesa Daraja, Tigopesa, Airtel).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payments-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: payments-ledger
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: borjie-secret-store
    kind: SecretStore
  target:
    name: payments-secrets
    creationPolicy: Owner
  data:
    - secretKey: STRIPE_SECRET_KEY
      remoteRef: { key: STRIPE_SECRET_KEY }
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef: { key: STRIPE_WEBHOOK_SECRET }
    - secretKey: MPESA_CONSUMER_KEY
      remoteRef: { key: MPESA_CONSUMER_KEY }
    - secretKey: MPESA_CONSUMER_SECRET
      remoteRef: { key: MPESA_CONSUMER_SECRET }
    - secretKey: MPESA_PASSKEY
      remoteRef: { key: MPESA_PASSKEY }
    - secretKey: MPESA_BUSINESS_SHORT_CODE
      remoteRef: { key: MPESA_BUSINESS_SHORT_CODE }
    - secretKey: TIGOPESA_API_KEY
      remoteRef: { key: TIGOPESA_API_KEY }
    - secretKey: AIRTEL_MONEY_API_KEY
      remoteRef: { key: AIRTEL_MONEY_API_KEY }
---
# notifications-only secrets (Twilio, Africa's Talking, Resend, SES).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: notifications-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: notifications
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: borjie-secret-store
    kind: SecretStore
  target:
    name: notifications-secrets
    creationPolicy: Owner
  data:
    - secretKey: TWILIO_ACCOUNT_SID
      remoteRef: { key: TWILIO_ACCOUNT_SID }
    - secretKey: TWILIO_AUTH_TOKEN
      remoteRef: { key: TWILIO_AUTH_TOKEN }
    - secretKey: TWILIO_PHONE_NUMBER
      remoteRef: { key: TWILIO_PHONE_NUMBER }
    - secretKey: AFRICAS_TALKING_API_KEY
      remoteRef: { key: AFRICAS_TALKING_API_KEY }
    - secretKey: AFRICAS_TALKING_USERNAME
      remoteRef: { key: AFRICAS_TALKING_USERNAME }
    - secretKey: RESEND_API_KEY
      remoteRef: { key: RESEND_API_KEY }
{{- if and .Values.postgres.enabled (not .Values.postgres.external.enabled) }}
---
# postgres bootstrap credentials. Only created when running in-cluster.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: borjie-secret-store
    kind: SecretStore
  target:
    name: postgres-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef: { key: POSTGRES_USER }
    - secretKey: POSTGRES_PASSWORD
      remoteRef: { key: POSTGRES_PASSWORD }
{{- end }}
{{- end }}
