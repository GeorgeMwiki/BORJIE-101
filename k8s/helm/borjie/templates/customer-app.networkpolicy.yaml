{{- $w := .Values.apps.customerApp -}}
{{- if and $w.enabled .Values.networkPolicy.enabled -}}
# Allow PUBLIC ingress from ingress-nginx to the customer-app pod, and
# allow egress to api-gateway (the only backend it talks to).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $w.name }}-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $w.name }}
spec:
  podSelector:
    matchLabels:
      {{- include "borjie.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ $w.name }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - { protocol: TCP, port: {{ $w.port }} }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $w.name }}-egress-to-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $w.name }}
spec:
  podSelector:
    matchLabels:
      {{- include "borjie.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ $w.name }}
  policyTypes: [Egress]
  egress:
    # Frontend egress is restricted to api-gateway, DNS, and external
    # HTTPS (for Supabase / Sentry / PostHog when those run as PaaS).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: {{ .Values.services.apiGateway.name }}
      ports:
        - { protocol: TCP, port: {{ .Values.services.apiGateway.port }} }
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
          podSelector:       { matchLabels: { k8s-app: kube-dns } }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{- end }}
