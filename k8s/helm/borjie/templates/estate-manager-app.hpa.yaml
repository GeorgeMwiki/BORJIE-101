{{- $w := .Values.apps.estateManagerApp -}}
{{- if and $w.enabled $w.autoscaling.enabled -}}
# Note: when KEDA HTTP add-on is also active (see keda/scaledobject-estate-manager-app.yaml),
# the ScaledObject overrides this HPA. Keep both — KEDA wins, HPA is fallback.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $w.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $w.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $w.name }}
  minReplicas: {{ $w.autoscaling.minReplicas }}
  maxReplicas: {{ $w.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ $w.autoscaling.targetCPUUtilizationPercentage }} }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: {{ $w.autoscaling.targetMemoryUtilizationPercentage }} }
{{- end }}
