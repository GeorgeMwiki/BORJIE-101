{{- $w := .Values.apps.customerApp -}}
{{- if $w.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $w.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $w.name }}
spec:
  type: ClusterIP
  selector:
    {{- include "borjie.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $w.name }}
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
  internalTrafficPolicy: Cluster
{{- end }}
