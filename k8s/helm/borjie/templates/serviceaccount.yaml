{{- if .Values.serviceAccount.create -}}
# Per-service ServiceAccounts. Each workload gets its own SA so that:
#   - AWS IRSA / GCP Workload Identity can attach a narrowly-scoped IAM
#     role to JUST that service (e.g. payments-ledger gets payment
#     provider secrets, reports gets read-only S3 for export buckets).
#   - Audit logs can attribute every Postgres / Kubernetes API call to a
#     specific service.
#   - Token rotation is per-service — compromise of one SA doesn't
#     compromise the whole release.
#
# The chart also keeps `automountServiceAccountToken: false` on every
# Deployment template (see *.deployment.yaml). Containers that need an
# IRSA token mount it explicitly via projected volume.

{{- $common := default (dict) .Values.serviceAccount.commonAnnotations -}}
{{- $svc := .Values.serviceAccount.perService -}}

{{- /* ── Frontend SAs ── */ -}}
{{- range $key, $w := .Values.apps }}
{{- if $w.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $w.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "borjie.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $w.name }}
  annotations:
    {{- with $common }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with (index $svc $key).annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}

{{- /* ── Backend service SAs ── */ -}}
{{- range $key, $w := .Values.services }}
{{- if $w.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $w.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "borjie.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $w.name }}
    {{- if eq $key "paymentsLedger" }}
    borjie.io/sensitivity: pci-adjacent
    {{- end }}
  annotations:
    {{- with $common }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with (index $svc $key).annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}

{{- /* ── Chart-wide SA used by External Secrets Operator ── */ -}}
{{- if .Values.externalSecrets.enabled }}
---
# Used by the SecretStore in secrets-external.yaml. ESO authenticates as
# this SA, which carries the IRSA / Workload-Identity binding to the
# upstream secrets backend.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: borjie
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-secrets
  annotations:
    {{- with $common }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if eq .Values.secrets.provider "aws" }}
    {{- if .Values.secrets.aws.roleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.secrets.aws.roleArn | quote }}
    {{- end }}
    {{- else if eq .Values.secrets.provider "gcp" }}
    iam.gke.io/gcp-service-account: borjie@{{ .Values.secrets.gcp.projectID }}.iam.gserviceaccount.com
    {{- end }}
automountServiceAccountToken: true
{{- end }}

{{- /* ── Migration-job SA ── */ -}}
{{- if .Values.migrate.enabled }}
---
# Standalone SA for the pre-upgrade migration Job. Lets us scope DB
# admin credentials (DDL rights) to just this transient pod.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: borjie-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
automountServiceAccountToken: false
{{- end }}
{{- end }}
