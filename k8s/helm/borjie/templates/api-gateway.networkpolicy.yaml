{{- $w := .Values.services.apiGateway -}}
{{- if and $w.enabled .Values.networkPolicy.enabled -}}
# api-gateway:
#   - INGRESS allowed only from the 4 frontend pods (NOT from ingress-nginx).
#   - EGRESS allowed to payments-ledger / reports / notifications / postgres / redis / DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $w.name }}-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $w.name }}
spec:
  podSelector:
    matchLabels:
      {{- include "borjie.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ $w.name }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/component: {{ .Values.apps.customerApp.name }} } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: {{ .Values.apps.estateManagerApp.name }} } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: {{ .Values.apps.ownerPortal.name }} } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: {{ .Values.apps.adminPlatformPortal.name }} } }
      ports:
        - { protocol: TCP, port: {{ $w.port }} }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $w.name }}-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $w.name }}
spec:
  podSelector:
    matchLabels:
      {{- include "borjie.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ $w.name }}
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: {{ .Values.services.paymentsLedger.name }} } }
      ports:
        - { protocol: TCP, port: {{ .Values.services.paymentsLedger.port }} }
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: {{ .Values.services.reports.name }} } }
      ports:
        - { protocol: TCP, port: {{ .Values.services.reports.port }} }
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: {{ .Values.services.notifications.name }} } }
      ports:
        - { protocol: TCP, port: {{ .Values.services.notifications.port }} }
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: postgres } }
      ports:
        - { protocol: TCP, port: 5432 }
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: redis } }
      ports:
        - { protocol: TCP, port: 6379 }
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
          podSelector:       { matchLabels: { k8s-app: kube-dns } }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{- end }}
