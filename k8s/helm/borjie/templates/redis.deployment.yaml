{{- if and .Values.redis.enabled (not .Values.redis.external.enabled) -}}
# Redis 7 baseline. For full HA (Sentinel) see k8s/ha/redis-sentinel-statefulset.yaml.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "borjie.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - { name: redis, port: 6379, targetPort: redis, protocol: TCP }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "borjie.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "borjie.labels" . | nindent 8 }}
        {{- include "borjie.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- include "borjie.podSecurityContext" . | nindent 8 }}
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          # TODO(scaffold): wire requirepass via Secret + envFrom.
          args:
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--save"
            - ""   # disable RDB snapshots by default (in-memory only).
          ports:
            - { name: redis, containerPort: 6379, protocol: TCP }
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          livenessProbe:
            tcpSocket: { port: redis }
            periodSeconds: 30
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: {{ .Values.podSecurity.runAsUser }}
            capabilities:
              drop: [ALL]
{{- end }}
