{{- if .Values.certManager.enabled -}}
# Let's Encrypt production ClusterIssuer. cert-manager watches Ingress
# resources annotated with `cert-manager.io/cluster-issuer:
# letsencrypt-prod` and provisions / renews certs automatically.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # TODO(scaffold): set this to the on-call ops email.
    email: {{ .Values.certManager.acmeEmail }}
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: {{ .Values.ingress.className }}
---
# Staging issuer — use this in dev / staging clusters to avoid Let's
# Encrypt rate limits during ingress experimentation.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    {{- include "borjie.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.acmeEmail }}
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: {{ .Values.ingress.className }}
{{- end }}
