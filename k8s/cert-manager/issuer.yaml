---
# ClusterIssuer for Let's Encrypt production (raw kubectl apply path).
# See helm/borjie/templates/cert-manager-issuer.yaml for the
# templated form.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/managed-by: kustomize
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # TODO(scaffold): set the on-call ops email — Let's Encrypt mails
    # renewal-failure alerts here.
    email: ops@borjie.example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/managed-by: kustomize
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@borjie.example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
