---
# BORJIE — Sealed Secrets (kubeseal) fallback path
#
# IMPORTANT: kubeseal / Sealed Secrets is NOT an ESO SecretStore backend.
# It is a separate Bitnami project that lets you commit encrypted secrets
# directly into git. ESO has no "Sealed Secrets provider"; the two solve
# the same problem via different mechanics. This file documents the fallback
# and pins the controller version so seed-secrets.sh can install it idempotently.
#
# When to use this backend:
#   - Offline / air-gapped clusters that cannot reach GCP or AWS APIs
#   - Bare-metal / k3s / kind / self-hosted dev clusters
#   - "GitOps-only" workflows where the cluster has zero outbound IAM bindings
#
# Prerequisites (one-time, see README.md for full runbook):
#   1. Install the kubeseal CLI locally:
#        brew install kubeseal           # macOS
#        # or download from https://github.com/bitnami-labs/sealed-secrets/releases
#   2. Install the controller into kube-system (seed-secrets.sh does this):
#        kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.27.1/controller.yaml
#   3. Fetch the public sealing certificate (rotated by the controller):
#        kubeseal --fetch-cert > .sealed-secrets/pub-cert.pem
#   4. Seal a literal — output committable to git:
#        kubectl create secret generic borjie-secrets \
#          --namespace=borjie \
#          --from-literal=DATABASE_URL="$DATABASE_URL" \
#          --dry-run=client -o yaml \
#          | kubeseal --cert=.sealed-secrets/pub-cert.pem \
#              --format=yaml > k8s/external-secrets/sealed-borjie-secrets.yaml
#
# Env vars consumed by seed-secrets.sh:
#   SEALED_SECRETS_VERSION  — optional, defaults to v0.27.1
#   SEALED_SECRETS_CERT     — optional path; defaults to .sealed-secrets/pub-cert.pem
#
# This file is a *marker* manifest: it creates the namespace + a placeholder
# ConfigMap that records which controller version + cert fingerprint this
# environment expects. The real SealedSecret CRs live next to the app chart.
---
apiVersion: v1
kind: Namespace
metadata:
  name: borjie
  labels:
    app.kubernetes.io/name: borjie
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: borjie-sealed-secrets-meta
  namespace: borjie
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/component: external-secrets
    backend: kubeseal
data:
  # Pinned controller version. Bump in seed-secrets.sh + here together.
  controllerVersion: v0.27.1
  controllerNamespace: kube-system
  # Document the expected secret name so app charts can reference it.
  expectedSecretName: borjie-secrets
  # Note for operators — kubeseal has no SecretStore CRD.
  note: |
    Sealed Secrets is a fallback path. Use GCP or AWS SecretStore when possible.
    SealedSecret CRs live alongside the app chart; the controller in
    kube-system decrypts them in-cluster and emits real Secret objects.
