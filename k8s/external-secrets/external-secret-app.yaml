---
# Raw ExternalSecret manifest mirroring the Helm template. Apply this
# when not using Helm. See helm/borjie/templates/secrets-external.yaml
# for the templated form and the full list of expected secrets.
#
# TODO(scaffold): seed each remoteRef.key into the secrets backend
# before applying this manifest.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: borjie
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: borjie-secret-store
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - { secretKey: DATABASE_URL,                 remoteRef: { key: DATABASE_URL } }
    - { secretKey: DATABASE_URL_READ,            remoteRef: { key: DATABASE_URL_READ } }
    - { secretKey: REDIS_URL,                    remoteRef: { key: REDIS_URL } }
    - { secretKey: NEXT_PUBLIC_SUPABASE_URL,     remoteRef: { key: NEXT_PUBLIC_SUPABASE_URL } }
    - { secretKey: NEXT_PUBLIC_SUPABASE_ANON_KEY,remoteRef: { key: NEXT_PUBLIC_SUPABASE_ANON_KEY } }
    - { secretKey: SUPABASE_SERVICE_ROLE_KEY,    remoteRef: { key: SUPABASE_SERVICE_ROLE_KEY } }
    - { secretKey: FIELD_ENCRYPTION_MASTER_KEY,  remoteRef: { key: FIELD_ENCRYPTION_MASTER_KEY } }
    - { secretKey: HASH_CHAIN_PEPPER,            remoteRef: { key: HASH_CHAIN_PEPPER } }
    - { secretKey: SENTRY_DSN,                   remoteRef: { key: SENTRY_DSN } }
    - { secretKey: POSTHOG_API_KEY,              remoteRef: { key: POSTHOG_API_KEY } }
    # TODO(scaffold): keep this list in sync with `.env.example`.
