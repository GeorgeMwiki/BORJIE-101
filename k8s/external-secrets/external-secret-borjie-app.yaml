---
# BORJIE — ExternalSecret pulling app credentials from the active backend.
#
# Backend selection: change `secretStoreRef.name` to point to the active store:
#   - borjie-gcp   (GCP Secret Manager)
#   - borjie-aws   (AWS Secrets Manager)
# For the kubeseal fallback, do NOT apply this manifest — use a SealedSecret CR
# instead (see secret-store-kubeseal.yaml for instructions).
#
# Remote refs assume the secret names below already exist in the backend.
# seed-secrets.sh creates them with empty values that operators rotate via the
# cloud console or CLI. NO REAL SECRETS ARE STORED IN THIS REPO.
#
# Synced Secret object: `borjie-secrets` (Opaque) — referenced by the app
# deployment via `envFrom: [{ secretRef: { name: borjie-secrets } }]`.
#
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: borjie-app
  namespace: borjie
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/component: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    # CHANGE per environment: borjie-gcp | borjie-aws
    kind: SecretStore
    name: borjie-gcp
  target:
    name: borjie-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: borjie
          app.kubernetes.io/component: app-secrets
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: borjie/database-url
        # GCP: omit version => "latest"; AWS: omit version => current AWSCURRENT.
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: borjie/anthropic-api-key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: borjie/openai-api-key
    - secretKey: DEEPSEEK_API_KEY
      remoteRef:
        key: borjie/deepseek-api-key
    - secretKey: MPESA_CONSUMER_SECRET
      remoteRef:
        key: borjie/mpesa-consumer-secret
    - secretKey: MPESA_PASSKEY
      remoteRef:
        key: borjie/mpesa-passkey
