---
# BORJIE — External Secrets Operator SecretStore for GCP Secret Manager
#
# Backend: GCP Secret Manager
# Auth: Workload Identity (preferred) — no static keys mounted into the cluster.
#
# Prerequisites (one-time, see README.md for full runbook):
#   1. GCP project has Secret Manager API enabled:
#        gcloud services enable secretmanager.googleapis.com --project="$GCP_PROJECT"
#   2. GKE cluster has Workload Identity enabled:
#        gcloud container clusters update <cluster> --workload-pool="$GCP_PROJECT.svc.id.goog"
#   3. GCP service account exists and has roles/secretmanager.secretAccessor:
#        gcloud iam service-accounts create borjie-eso \
#          --display-name="BORJIE External Secrets Operator"
#        gcloud secrets add-iam-policy-binding borjie-database-url \
#          --member="serviceAccount:borjie-eso@$GCP_PROJECT.iam.gserviceaccount.com" \
#          --role="roles/secretmanager.secretAccessor"
#   4. Workload Identity binding between KSA and GSA:
#        gcloud iam service-accounts add-iam-policy-binding \
#          borjie-eso@$GCP_PROJECT.iam.gserviceaccount.com \
#          --role="roles/iam.workloadIdentityUser" \
#          --member="serviceAccount:$GCP_PROJECT.svc.id.goog[borjie/borjie-eso]"
#
# Env vars consumed by seed-secrets.sh:
#   GCP_PROJECT        — required, GCP project id hosting Secret Manager
#   GCP_REGION         — optional, defaults to us-central1 for regional secret routing
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: borjie-eso
  namespace: borjie
  annotations:
    # Workload Identity binding to the GCP service account (CHANGE PROJECT ID).
    iam.gke.io/gcp-service-account: borjie-eso@REPLACE_GCP_PROJECT.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/component: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: borjie-gcp
  namespace: borjie
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/component: external-secrets
    backend: gcp-secret-manager
spec:
  provider:
    gcpsm:
      # CHANGE: GCP project id where secrets live.
      projectID: REPLACE_GCP_PROJECT
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: REPLACE_GKE_CLUSTER
          clusterProjectID: REPLACE_GCP_PROJECT
          serviceAccountRef:
            name: borjie-eso
