---
# SecretStore for raw `kubectl apply` path (non-Helm).
# Workload Identity (GCP) — annotate the SA with the GCP IAM SA email.
# TODO(scaffold): switch provider block for AWS/Vault as needed.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: borjie-secret-store
  namespace: borjie
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/managed-by: kustomize
spec:
  provider:
    gcpsm:
      # TODO(scaffold): set the GCP project that holds the secrets.
      projectID: borjie-prod
      auth:
        workloadIdentity:
          clusterLocation: europe-west3
          clusterName: borjie-prod
          serviceAccountRef:
            name: borjie
