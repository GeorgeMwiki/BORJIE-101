---
# BORJIE — External Secrets Operator SecretStore for AWS Secrets Manager
#
# Backend: AWS Secrets Manager
# Auth: IRSA (IAM Roles for Service Accounts) — no static AWS keys in the cluster.
#
# Prerequisites (one-time, see README.md for full runbook):
#   1. EKS cluster has an OIDC provider:
#        eksctl utils associate-iam-oidc-provider --cluster="$EKS_CLUSTER" --approve
#   2. IAM policy granting Secrets Manager read on borjie/* secrets:
#        aws iam create-policy \
#          --policy-name BorjieESOReadPolicy \
#          --policy-document file://eso-read-policy.json
#      where eso-read-policy.json contains:
#        {
#          "Version": "2012-10-17",
#          "Statement": [{
#            "Effect": "Allow",
#            "Action": ["secretsmanager:GetSecretValue", "secretsmanager:DescribeSecret"],
#            "Resource": "arn:aws:secretsmanager:*:*:secret:borjie/*"
#          }]
#        }
#   3. IAM role with trust policy for the KSA via OIDC:
#        eksctl create iamserviceaccount \
#          --cluster="$EKS_CLUSTER" \
#          --namespace=borjie \
#          --name=borjie-eso \
#          --attach-policy-arn=arn:aws:iam::$AWS_ACCOUNT_ID:policy/BorjieESOReadPolicy \
#          --approve --override-existing-serviceaccounts
#
# Env vars consumed by seed-secrets.sh:
#   AWS_REGION         — required, e.g. us-east-1 (defaults to us-east-1)
#   AWS_ACCOUNT_ID     — required, used in IRSA role ARN
#   EKS_CLUSTER        — required, EKS cluster name for OIDC binding
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: borjie-eso
  namespace: borjie
  annotations:
    # IRSA binding to the IAM role (CHANGE ACCOUNT ID).
    eks.amazonaws.com/role-arn: arn:aws:iam::REPLACE_AWS_ACCOUNT_ID:role/BorjieESORole
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/component: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: borjie-aws
  namespace: borjie
  labels:
    app.kubernetes.io/name: borjie
    app.kubernetes.io/component: external-secrets
    backend: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      # CHANGE: AWS region where Secrets Manager holds borjie/* secrets.
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: borjie-eso
