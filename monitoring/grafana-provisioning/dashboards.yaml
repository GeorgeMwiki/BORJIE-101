# Grafana dashboard provisioning manifest — Wave-K Tier-3 W-Ops.
#
# Source of truth for the auto-import path. Bind-mounted into Grafana at
# /etc/grafana/provisioning/dashboards/. Mirror of the inline manifest in
# infrastructure/k8s/monitoring/grafana-dashboards-configmap.yaml so the
# docker-compose stack picks up dashboard JSONs from the same source as
# the k8s ConfigMap.
apiVersion: 1
providers:
  - name: borjie
    orgId: 1
    folder: ""
    type: file
    disableDeletion: true
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
